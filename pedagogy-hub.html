<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedagogical Approaches</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --pbl:#4a6741;--pbl-light:#eaf2e8;--pbl-mid:#7aaa6f;
  --ibl:#3d6b84;--ibl-light:#e6f0f6;--ibl-mid:#6a9bb5;
  --cbl:#7a6a3a;--cbl-light:#f5f0e3;--cbl-mid:#b9a46a;
  --ssi:#6a3d6b;--ssi-light:#f4eaf5;--ssi-mid:#aa6aab;
  --ink:#1a1614;--slate:#5a5650;--rule:#ddd8d0;--bg:#f8f5f0;
  --radius:6px;--shadow:0 2px 8px rgba(0,0,0,.08);
  --accent:var(--pbl);--accent-light:var(--pbl-light);--accent-mid:var(--pbl-mid);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.65}

/* header */
header{background:var(--ink);color:#f8f5f0;padding:20px 32px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:baseline;gap:20px}
header h1{font-family:'Libre Baskerville',serif;font-size:1.1rem;font-weight:700;letter-spacing:.01em;white-space:nowrap}
header .subtitle{font-size:.72rem;color:#b0aa9f;letter-spacing:.05em;text-transform:uppercase}

/* tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--rule);overflow-x:auto;scrollbar-width:none;position:sticky;top:58px;z-index:90}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:13px 26px;font-size:.82rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;border:none;background:none;color:var(--slate);border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;white-space:nowrap}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* panels */
.panel{display:none;padding:28px 26px 64px;max-width:1100px;margin:0 auto}
.panel.active{display:block}

/* accordions */
.accordion{margin-bottom:10px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--rule)}
.acc-btn{width:100%;display:flex;justify-content:space-between;align-items:center;padding:13px 18px;cursor:pointer;border:none;background:#fff;text-align:left;font-family:'Libre Baskerville',serif;font-size:.92rem;font-weight:700;color:var(--ink);transition:background .15s}
.acc-btn:hover{background:var(--bg)}
.acc-btn.open{border-bottom:1px solid var(--rule)}
.acc-arrow{font-size:.75rem;color:var(--slate);transition:transform .2s}
.acc-btn.open .acc-arrow{transform:rotate(180deg)}
.acc-body{display:none;padding:20px 20px 24px;background:#fff}
.acc-body.open{display:block}

/* what is */
.what-is-bullets{list-style:disc;padding-left:1.4em}
.what-is-bullets li{margin-bottom:.45em;font-size:.88rem}
.what-is-bullets li.sub{list-style:circle;margin-left:1.2em}
.what-is-image{margin:14px 0;text-align:center}
.what-is-image img{max-width:100%;border-radius:var(--radius);border:1px solid var(--rule)}
.what-is-image figcaption{font-size:.76rem;color:var(--slate);margin-top:5px;font-style:italic}

/* key question */
.key-question{background:var(--accent-light);border-left:4px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0;padding:14px 18px;margin-bottom:18px;font-size:.87rem;line-height:1.75}
.key-question strong{display:block;font-family:'Libre Baskerville',serif;font-size:.92rem;margin-bottom:5px}

/* preambles */
.le-preamble{margin-bottom:16px}
.le-preamble ul,.diff-preamble ul{list-style:disc;padding-left:1.4em}
.le-preamble li,.diff-preamble li{margin-bottom:.38em;font-size:.87rem}
.le-preamble li.sub,.diff-preamble li.sub{list-style:circle;margin-left:1.2em}
.diff-preamble{margin-bottom:14px}

/* toolbar */
.phase-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.ctrl-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--rule);background:#fff;font-size:.76rem;font-weight:500;cursor:pointer;color:var(--slate);transition:all .15s}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.ctrl-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* tech toggle slider */
.toggle-wrap{display:flex;align-items:center;gap:8px;font-size:.76rem;font-weight:500;color:var(--slate);cursor:pointer;user-select:none}
.toggle-wrap input[type=checkbox]{display:none}
.toggle-track{width:34px;height:18px;background:var(--rule);border-radius:9px;position:relative;transition:background .2s;flex-shrink:0}
.toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input:checked+.toggle-track{background:var(--accent)}
input:checked+.toggle-track::after{transform:translateX(16px)}

/* phase table */
.phase-table-wrap{overflow-x:auto}
table.phase-tbl{width:100%;border-collapse:collapse;font-size:.83rem;table-layout:auto}
.phase-tbl th{background:var(--accent);color:#fff;padding:9px 12px;text-align:left;font-weight:600;font-size:.76rem;letter-spacing:.04em;white-space:nowrap}
.phase-tbl td{vertical-align:top;border:1px solid var(--rule)}
.phase-tbl tbody tr:nth-child(even) td{background:var(--accent-light)}

/* scrollable cells */
.cell-scroll{padding:9px 11px;max-height:200px;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--rule) transparent}
.cell-scroll::-webkit-scrollbar{width:4px}
.cell-scroll::-webkit-scrollbar-thumb{background:var(--rule);border-radius:2px}
.cell-scroll::-webkit-scrollbar-thumb:hover{background:var(--accent-mid)}

.phase-label{font-weight:600;color:var(--accent);font-size:.8rem;padding:9px 11px;vertical-align:top;white-space:normal;min-width:120px}
.aims-cell{font-size:.78rem;color:var(--slate);font-style:italic;padding:9px 11px;vertical-align:top}

/* tech badge */
.tech-badge{display:inline-block;font-size:.63rem;font-weight:700;background:var(--accent);color:#fff;padding:1px 4px;border-radius:3px;margin-right:3px;vertical-align:middle;letter-spacing:.04em}
.tech-hidden .tech-item{display:none}

/* bullet lists with sub-levels */
.bullet-list{list-style:disc;padding-left:1.15em}
.bullet-list li{margin-bottom:.32em}
.bullet-list li.sub{list-style:circle;margin-left:1.1em}
.bullet-list ul{list-style:circle;padding-left:1.1em;margin-top:.2em}

/* cards */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.phase-card{background:#fff;border:1px solid var(--rule);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.phase-card h3{font-family:'Libre Baskerville',serif;font-size:.87rem;color:var(--accent);margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--rule)}
.card-role{font-size:.71rem;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.05em;margin:7px 0 3px}

/* diff tables */
table.diff-tbl{width:100%;border-collapse:collapse;font-size:.82rem;table-layout:auto}
.diff-tbl th{background:var(--accent);color:#fff;padding:8px 11px;text-align:left;font-size:.76rem;font-weight:600;letter-spacing:.04em}
.diff-tbl td{vertical-align:top;padding:9px 11px;border:1px solid var(--rule)}
.diff-tbl tbody tr:nth-child(odd) td{background:#fff}
.diff-tbl tbody tr:nth-child(even) td{background:var(--accent-light)}
.diff-stage{font-weight:600;color:var(--accent);font-size:.8rem}
.diff-role{font-size:.73rem;color:var(--slate);font-style:italic;margin-top:2px}

/* IBL matrix */
.ibl-matrix{width:100%;border-collapse:collapse;font-size:.79rem;table-layout:auto}
.ibl-matrix th{background:var(--accent);color:#fff;padding:8px 9px;text-align:center;font-size:.74rem;letter-spacing:.03em}
.ibl-matrix th.fhdr{text-align:left;width:13%}
.ibl-matrix th.rhdr{width:8%}
.ibl-matrix td{vertical-align:top;padding:7px 9px;border:1px solid var(--rule)}
.ibl-matrix .fcell{font-weight:600;color:var(--accent);font-size:.8rem}
.ibl-matrix .rcell{font-size:.72rem;color:var(--slate);font-style:italic}
.ibl-matrix tr.trow td{background:#fff}
.ibl-matrix tr.srow td{background:var(--accent-light)}
.ibl-arrow-row th{padding:4px 9px;font-size:.68rem;font-weight:400;font-style:italic;background:#3a3a3a}

/* view states */
.view-table .cards-grid{display:none}
.view-cards .phase-table-wrap{display:none}

@media(max-width:700px){
  header{padding:14px 16px}
  .panel{padding:18px 12px 48px}
  .tab{padding:11px 14px;font-size:.75rem}
  .phase-tbl{font-size:.76rem}
}
</style>
</head>

t action can we take, and what trade-offs must we consider?", "tech": false, "level": 1}], "le_preamble": [{"text": "This LE is situated within a learning sequence that includes all the phases of PBL.", "tech": false, "level": 0}, {"text": "In this learning sequence, students first encounter an authentic problem on acidic rainfall on Singapore's infrastructure and heritage building conservation.", "tech": false, "level": 0}, {"text": "Students identify relevant facts and knowledge gaps, generate hypotheses about how acidic rainfall affects carbonate-based materials, conduct a practical investigation using acidic solutions and marble chips or limestone, apply their new knowledge to interpret evidence, and finally propose evidence-informed conservation actions.", "tech": false, "level": 0}], "diff_preamble": [{"text": "Problem-based learning can be differentiated for students of different readiness."}, {"text": "The essence of PBL is preserved in all differentiation, where students engage in sense-making the authentic problem, identifying learning needs, gathering and evaluating evidence, constructing explanations and proposing evidence-information solutions."}], "key_question": "Key Question: How should Singapore manage the impact of acidic rainfall on infrastructure and heritage building conservation? Singapore's heritage buildings are more than old structures; they are tangible records of the nation's history, cultural identity and collective memory. Landmarks such as churches, monuments, memorials, and colonial-era buildings connect present-day Singaporeans to their past. Once damaged, many of their original features and architectural details cannot be fully restored. In this Problem-Based Learning experience, students explore the challenge of protecting heritage buildings from the long-term effects of acidic rainfall. Although Singapore does not experience acid rain at the same severity as some heavily industrialised regions, air pollutants can dissolve in rainwater to form acids. Over time, acidic rainfall can react with building materials such as limestone and marble, which contain calcium carbonate. These reactions gradually erode surfaces, weaken structures, and remove intricate carvings and inscriptions that hold historical significance. Using heritage conservation as the context helps students develop an affective connection to the issue. Rather than learning acid-base chemistry as an abstract topic, students engage with a real-world problem that has local relevance and social significance. They consider how scientific knowledge can contribute to preserving places that matter to Singapore and future generations. The context also presents a hopeful and action-oriented perspective. While the effects of acidic rainfall can accumulate over long periods, scientific understanding enables early detection, preventive maintenance, material selection, and conservation strategies that can reduce damage. Students investigate the chemistry behind acidic rainfall, analyse evidence on its impact on different materials, and evaluate possible mitigation measures.", "phase_table": {"col_headers": ["Phase", "Teachers' Role", "Students' Role", "Alignment of PBL to the 3 aims"], "teacher_col": 1, "student_col": 2, "aims_col": 3, "rows": [{"phase": "Problem Scenario", "teacher": [{"text": "Present the problem: \"How should Singapore manage the impact of acidic rainfall on infrastructure and heritage building conservation?\"", "tech": false, "level": 0}, {"text": "Curate virtual tours of Singapore's heritage buildings to build an affective connection to these spaces, helping students appreciate their historical significance and understand why preserving them matters.", "tech": true, "level": 0}, {"text": "Teachers can also bring students on a learning journey to visit these places of interest.", "tech": false, "level": 0}, {"text": "Use images or videos of weathered buildings, heritage structures, statues or concrete surfaces to make the issue visible and relatable.", "tech": true, "level": 0}], "student": [{"text": "Ask questions to clarify the problem.", "tech": false, "level": 0}, {"text": "Identify why the issue matters scientifically, historically and socially.", "tech": false, "level": 0}, {"text": "Share initial ideas about how acidic rainfall may affect buildings.", "tech": false, "level": 0}, {"text": "Explain why heritage conservation matters.", "tech": false, "level": 0}], "aims": "[Appreciate] Students see the relevance of science in protecting infrastructure and heritage buildings in Singapore. They recognise that science can help address issues that affect society, culture and the environment."}, {"phase": "Identify Facts to formulate and analyse the problem", "teacher": [{"text": "Guide students to identify key facts from the scenario.", "tech": false, "level": 0}, {"text": "Use prompts such as:", "tech": false, "level": 0}, {"text": "\"What do we observe?\"", "tech": false, "level": 1}, {"text": "\"What do we already know?\"", "tech": false, "level": 1}, {"text": "\"What scientific ideas may be relevant?\"", "tech": false, "level": 1}, {"text": "\"What information do we need before proposing a solution?\"", "tech": false, "level": 1}, {"text": "Use videos, animations or interactives to introduce acid rain, weathering and effects on carbonate-based materials.", "tech": true, "level": 0}, {"text": "Use a teacher demonstration or video showing acid reacting with marble chips to introduce the phenomenon.", "tech": true, "level": 0}, {"text": "Use platforms such as Google Docs, Padlet or SLS discussion boards for students to co-construct facts, observations and questions.", "tech": true, "level": 0}], "student": [{"text": "Identify observable facts from images, videos and demonstrations.", "tech": false, "level": 0}, {"text": "Recap prior knowledge about acids, pH, chemical reactions, carbonates and environmental conditions.", "tech": false, "level": 0}, {"text": "Generate questions about what they need to investigate further.", "tech": false, "level": 0}], "aims": "[Understand] Students connect real-world observations to scientific ideas such as acids and bases, pH, chemical reactions and material properties."}, {"phase": "Generate Hypotheses", "teacher": [{"text": "Facilitate students in proposing possible relationships between the acidity of rainfall, the properties of building materials, and the rate or extent of material degradation.", "tech": false, "level": 0}, {"text": "Use prompts such as:", "tech": false, "level": 0}, {"text": "\"How might increasing acidity affect the reaction between acidic rainfall and marble or limestone?\"", "tech": false, "level": 1}, {"text": "\"Which building materials might be more vulnerable to acidic rainfall, and why?\"", "tech": false, "level": 1}, {"text": "\"What evidence would support or challenge your explanation?", "tech": false, "level": 1}, {"text": "Use simulations, animations, or interactive models with embedded feedback to help students visualise particle interactions and explore initial predictions.", "tech": true, "level": 0}], "student": [{"text": "Generate hypotheses about how acidic rainfall may affect different building materials.", "tech": false, "level": 0}, {"text": "Predict how factors such as pH, acid concentration, and material composition may influence the rate and extent of damage.", "tech": false, "level": 0}, {"text": "Formulate investigable questions and identify the evidence required to test their hypotheses.", "tech": false, "level": 0}, {"text": "Refine their hypotheses based on initial observations, simulations, or available information.", "tech": false, "level": 0}], "aims": "[Understand] Students develop conceptual understanding by proposing and refining explanations for the relationships between acidity, material properties, and chemical weathering. [Understand] Students engage in the practices of science by formulating investigable questions, developing hypotheses, and identifying evidence needed to evaluate competing explanations."}, {"phase": "Identify Knowledge Deficiencies for self-directed learning", "teacher": [{"text": "Facilitate students in identifying what they need to know to solve the problem.", "tech": false, "level": 0}, {"text": "Guide students to consider knowledge needed to solve the problem, including:", "tech": false, "level": 0}, {"text": "pH and acidity", "tech": false, "level": 1}, {"text": "acid-carbonate reactions", "tech": false, "level": 1}, {"text": "factors affecting rate of reaction", "tech": false, "level": 1}, {"text": "properties of materials", "tech": false, "level": 1}, {"text": "heritage buildings conservation approaches", "tech": false, "level": 1}, {"text": "Use digital reflection journals or portfolios to support reflection. The following prompts can be used to guide students:", "tech": true, "level": 0}, {"text": "\"What do I understand?\"", "tech": false, "level": 1}, {"text": "\"What am I unsure about?\"", "tech": false, "level": 1}, {"text": "\"What do I need to find out next?\"", "tech": false, "level": 1}], "student": [{"text": "Identify knowledge gaps and learning needs.", "tech": false, "level": 0}, {"text": "Formulate research questions", "tech": false, "level": 0}, {"text": "Conduct guided research using curated sources.", "tech": false, "level": 0}, {"text": "Record questions and learning points in a reflection journal or group learning log.", "tech": false, "level": 0}], "aims": "[Take Action] Students take ownership of their learning by identifying and addressing knowledge gaps needed to solve a real-world problem."}, {"phase": "Apply New Knowledge to evaluate their hypotheses in light of what they have learnt", "teacher": [{"text": "Support students in carrying out a structured practical investigation using solutions of different pH and building materials (e.g., carbonate, other possible materials proposed for the solution)", "tech": false, "level": 0}, {"text": "Facilitate safe collection of quantitative and qualitative evidence", "tech": false, "level": 0}, {"text": "Use digital probes, sensors, balances, data loggers, spreadsheets, or AI-supported tools for data collection and analysis.", "tech": true, "level": 0}, {"text": "Guide students to connect experimental findings to the broader conservation efforts", "tech": false, "level": 0}], "student": [{"text": "Design or conduct investigations to gather evidence.", "tech": false, "level": 0}, {"text": "Collect, record, and analyse data.", "tech": false, "level": 0}, {"text": "Identify patterns and trends.", "tech": false, "level": 0}, {"text": "Relate findings to the effects of acidic rainfall on heritage buildings and infrastructure.", "tech": false, "level": 0}, {"text": "Evaluate the strengths and limitations of their evidence.", "tech": false, "level": 0}], "aims": "[Understand] Students deepen conceptual understanding of acids, pH, reaction rates, and carbonate reactions through evidence-based investigation. [Understand] Students engage in scientific inquiry and construct explanations using data."}, {"phase": "Consolidation and Solution Development", "teacher": [{"text": "Guide students to construct evidence-based explanations using a Claim-Evidence-Reasoning (CER) framework.", "tech": false, "level": 0}, {"text": "Help students explain how acidic rainfall affects carbonate-based building materials.", "tech": false, "level": 0}, {"text": "Facilitate reflection on how the practical investigation informs understanding of the real-world problem.", "tech": false, "level": 0}, {"text": "Challenge students to evaluate possible conservation strategies and justify recommendations using scientific evidence.", "tech": false, "level": 0}, {"text": "Provide the action task: Select a heritage building in Singapore, identify potential vulnerabilities to acidic rainfall, and propose a conservation plan.", "tech": false, "level": 0}], "student": [{"text": "Construct and communicate evidence-based explanations.", "tech": false, "level": 0}, {"text": "Connect practical findings to the original problem context.", "tech": false, "level": 0}, {"text": "Reflect on the reliability and limitations of their evidence.", "tech": false, "level": 0}, {"text": "Develop, justify, and communicate a conservation plan using evidence from investigations and research.", "tech": false, "level": 0}, {"text": "Evaluate the strengths and limitations of different conservation approaches.", "tech": false, "level": 0}], "aims": "[Understand] Students consolidate scientific understanding by linking evidence to explanations about acid-carbonate reactions and material degradation. [Appreciate] Students recognise how scientific evidence informs decisions about protecting infrastructure and heritage assets. [Take Action] Students apply scientific understanding to propose and justify evidence-informed solutions to a real-world challenge."}]}, "diff_table": {"type": "standard", "headers": ["PBL phase", "For lower readiness students", "For higher readiness students"], "stages": [{"stage": "Problem Scenario", "lower": "Use guiding questions to help students identify the key problem, stakeholders, and possible impacts of acidic rainfall. Provide structured prompts to help students connect the issue to heritage conservation and everyday life. Introduce key vocabulary and concepts before engaging with the scenario.", "higher": "Encourage students to independently identify relevant scientific, environmental, social, economic, and cultural dimensions of the problem. Invite students to formulate their own problem statements and identify stakeholders."}, {"stage": "Identify Facts to formulate and analyse the problem", "lower": "Provide graphic organisers to categorise facts, observations, assumptions, and questions. Use curated resources and targeted prompts to support information gathering. Guide students in identifying relevant scientific concepts and information needed to address the problem.", "higher": "Encourage students to independently determine what information is relevant and identify additional information required. Require students to evaluate the credibility and relevance of different information sources."}, {"stage": "Generate Hypotheses", "lower": "Provide hypothesis stems, guiding questions, and examples to support causal reasoning. Focus students on a smaller number of variables when considering possible explanations.", "higher": "Encourage students to generate multiple hypotheses and consider interactions between variables. Require students to justify hypotheses using scientific principles and prior knowledge."}, {"stage": "Identify Knowledge Deficiencies for self-directed learning", "lower": "Use reflection prompts to help students identify gaps in their understanding. Provide curated resources at an appropriate level to support knowledge building.", "higher": "Encourage students to independently identify knowledge gaps, formulate research questions, and locate relevant sources. Require students to synthesise information from multiple sources."}, {"stage": "Apply New Knowledge to evaluate their hypotheses in light of what they have learnt", "lower": "Provide structured investigation procedures, observation prompts, data tables, and graphing templates. Reduce the number of variables students need to manage while ensuring they collect and interpret evidence relevant to the problem. Support students in connecting investigation findings to the effects of acidic rainfall on heritage buildings.", "higher": "Provide greater autonomy in planning or modifying investigations Allow students to investigate multiple variables (e.g., pH, concentration, exposure time, material type) and justify methodological choices. Require students to evaluate the quality and limitations of their evidence."}, {"stage": "Consolidation and Solution Development", "lower": "Provide Claim-Evidence-Reasoning (CER) scaffolds, sentence starters, and guiding questions to support explanation building. Support students in linking evidence to scientific concepts and the original problem. Provide a set of possible conservation strategies for students to evaluate and justify using evidence from their investigation and research. Use structured planning templates to support decision-making.", "higher": "Require students to independently construct explanations and evaluate alternative interpretations. Challenge students to critique the reliability, validity, and limitations of their evidence and reasoning. Require students to generate, compare, and defend their own conservation strategies. Challenge students to evaluate trade-offs such as cost, feasibility, effectiveness, sustainability, aesthetics, and heritage value. Require students to justify recommendations using multiple sources of evidence."}], "has_role_col": false, "unnamed_sentinel": "__UNNAMED__"}},ibl:{"what_is": [{"type": "bullet", "text": "Inquiry-Based Learning (IBL) is a constructivist approach to teaching and learning where students explore problems, issues, phenomena, or ideas through a process guided by driving questions.", "tech": false, "level": 0}, {"type": "bullet", "text": "IBL is characterised by 5 essential features:", "tech": false, "level": 0}, {"type": "bullet", "text": "Learners are engaged by scientifically oriented questions. These questions center on objects, organisms, and events in the natural world. They are also questions that lend themselves to empirical investigation and lead to gathering and using data to develop explanations for scientific phenomena.", "tech": false, "level": 1}, {"type": "bullet", "text": "Learners give priority to evidence, allowing them to develop and evaluate explanations that address scientifically oriented questions", "tech": false, "level": 1}, {"type": "bullet", "text": "Learners formulate explanations from evidence to address scientifically oriented questions.", "tech": false, "level": 1}, {"type": "bullet", "text": "Learners evaluate their explanations in light of alternative explanations, particularly those reflecting scientific understanding", "tech": false, "level": 1}, {"type": "bullet", "text": "Learners communicate and justify their proposed explanations", "tech": false, "level": 1}, {"type": "bullet", "text": "It is not necessary for all 5 essential features to be present in a single learning experience.", "tech": false, "level": 0}, {"type": "bullet", "text": "A number of different instructional models have been developed that support teachers in organising and sequencing inquiry-based learning experiences. All of these can incorporate the essential features of inquiry. There are common components shared by the instructional models:", "tech": false, "level": 0}, {"type": "bullet", "text": "1. Students engage with a scientific question, event, or phenomenon. This connects with what they already know, creates dissonance with their own ideas, and/or motivates them to learn more.", "tech": false, "level": 0}, {"type": "bullet", "text": "2. Students explore ideas though hands-on experiences, formulate and test hypotheses, solve problems, and create explanations for what they observe.", "tech": false, "level": 0}, {"type": "bullet", "text": "3. Students analyze and interpret data, synthesize their ideas, build models, and clarify concepts and explanations with teachers and other sources of scientific knowledge.", "tech": false, "level": 0}, {"type": "bullet", "text": "4. Students extend their new understanding and abilities and apply what they have learned to new situations.", "tech": false, "level": 0}, {"type": "bullet", "text": "5. Students, with their teachers, review and assess what they have learned and how they have learned it.", "tech": false, "level": 0}], "le_preamble": [{"text": "This LE exemplifies the five essential features of inquiry. Not all LEs are expected to incorporate all five features and may focus on selected aspects of the inquiry process.", "tech": false, "level": 0}], "diff_preamble": [{"text": "The learning experience described above exemplifies open inquiry, where students exercise a high degree of ownership over the inquiry process. Inquiry-based learning (IBL) can be differentiated according to students' readiness by varying the extent of teacher guidance and student self-direction across the essential features of inquiry."}, {"text": "Regardless of the level of guidance provided, the core intent of IBL remains unchanged. Students engage with authentic questions, gather and use evidence to construct explanations, persevere through uncertainty, and develop curiosity about the natural world."}, {"text": "The degree of \"openness\" in an inquiry is determined by the extent to which students assume responsibility for posing questions, collecting and analysing evidence, constructing and evaluating explanations, and communicating their findings."}, {"text": "To develop students' inquiry capabilities progressively, learning experiences should vary in their level of openness. Across their science learning journey, students should have opportunities to engage in a range of inquiry experiences--from confirmation and structured inquiry to guided and open inquiry--as they build the knowledge, skills, and dispositions needed to inquire independently."}], "phase_table": {"col_headers": ["Essential Features of Science as Inquiry", "Teacher's Role", "Students' Role", "Alignment of IBL to the 3 aims"], "teacher_col": 1, "student_col": 2, "aims_col": 3, "rows": [{"phase": "Question Learners are engaged by scientifically oriented questions", "teacher": [{"text": "Demonstrates the reaction between sodium thiosulfate and hydrochloric acid to create curiosity around an observable phenomenon", "tech": false, "level": 0}, {"text": "A video demonstrating the reaction may be used. Captions and pauses may be included to guide students' thinking.", "tech": true, "level": 0}, {"text": "Prompts students to observe and generate investigable questions related to factors affecting the rate of reaction.", "tech": false, "level": 0}, {"text": "Scaffolds students in refining questions to ensure that they are measurable, feasible, and scientifically investigable.", "tech": false, "level": 0}, {"text": "\"What measurements could we make to compare the rate of reactions?\"", "tech": false, "level": 1}, {"text": "\"What factors might influence how quickly the solution turns cloudy?\"", "tech": false, "level": 1}, {"text": "\"Which factor would you like to investigate?\"", "tech": false, "level": 1}, {"text": "Supports question generation through AI-enabled chatbot, where appropriate", "tech": true, "level": 0}], "student": [{"text": "Observe the reaction and identify variables that may affect the rate of reaction (e.g., concentration, temperature, surface area of reactants).", "tech": false, "level": 0}, {"text": "Formulate and refine an inquiry question related to reaction rate", "tech": false, "level": 0}, {"text": "Develop hypotheses and justify why a chosen variable may influence the reaction rate based on prior knowledge", "tech": false, "level": 0}, {"text": "Use AI-enabled chatbot in generating and refining the investigable questions.", "tech": true, "level": 0}], "aims": "[Understand] Students' prior knowledge is activated Students are engaged in formulating investigable questions and hypotheses, mirroring authentic scientific practices. [Appreciate] IBL can be grounded in real-world problems and anchor phenomena, making it directly relevant to students' lives. For example: (a) What causes everyday metal objects to rust? (b) How can we design barriers to prevent rusting? Open-ended questions encourage students to connect scientific concepts to their real-world applications."}, {"phase": "Evidence Learners give priority to evidence", "teacher": [{"text": "Facilitates the planning of investigations by providing feedback on variables, controls, methods, and safety considerations.", "tech": false, "level": 0}, {"text": "Supports students in using digital tools for planning, collaboration, and data collection.", "tech": true, "level": 0}], "student": [{"text": "Design and conduct investigations to examine the effect of selected variables on reaction rate.", "tech": false, "level": 0}, {"text": "Collect, organise, and analyse data systematically.", "tech": false, "level": 0}, {"text": "Use graphs and data trends to identify patterns and compare findings across groups.", "tech": false, "level": 0}, {"text": "Document their investigation plans digitally to enable teacher feedback and monitoring.", "tech": true, "level": 0}, {"text": "Collect, organise, and share data collaboratively using shared spreadsheets or collaborative platforms.", "tech": true, "level": 0}, {"text": "Analyse their data by plotting graphs on spreadsheets, identifying trends, and comparing findings across groups investigating different variables.", "tech": true, "level": 0}], "aims": "[Understand] Students engage in evidence-based reasoning, data collection and analysis which are core science practices that deepen understanding of disciplinary concepts"}, {"phase": "Explanations Learners formulate explanations from evidence", "teacher": [{"text": "Guides students in connecting experimental findings to collision theory.", "tech": false, "level": 0}, {"text": "Supports students' use of simulations and visualisations to deepen conceptual understanding and explain observed trends.", "tech": true, "level": 0}], "student": [{"text": "Use experimental evidence to explain observed trends in reaction rates.", "tech": false, "level": 0}, {"text": "Use simulations and animations to develop particle-level explanations for their findings", "tech": true, "level": 0}, {"text": "Refine explanations by integrating evidence from experiments and models.", "tech": false, "level": 0}], "aims": "[Understand] Students' conceptual understanding is deepened by linking observations to scientific theories and models [Take Action] The safe learning environments and scaffolding inherent in IBL encourage students to take intellectual risks, persist through uncertainty, and develop the curiosity and resilience needed for lifelong scientific inquiry. This transforms students from passive recipients of scientific knowledge into active contributors who can innovate and create positive impact for society."}, {"phase": "Connections/Evaluation Learners evaluate their explanations in light of alternative explanations particularly those reflecting scientific understandings", "teacher": [{"text": "Facilitates discussions that compare different findings and surface contrasting explanations", "tech": false, "level": 0}, {"text": "Uses AI-enabled tools to summarise discussion, identify common patterns or surface contrasting explanations", "tech": true, "level": 0}, {"text": "Provides feedback on the scientific validity of students' reasoning.", "tech": false, "level": 0}], "student": [{"text": "Critically examine how well simulations and models explain experimental observations.", "tech": false, "level": 0}, {"text": "Compare findings across groups investigating different variables.", "tech": false, "level": 0}, {"text": "Evaluate explanations against evidence and accepted scientific understanding (e.g., collision theory).", "tech": false, "level": 0}], "aims": "[Understand] Students develop critical thinking and deeper understanding through the evaluation of competing explanations. [Appreciate] Students appreciate the nature of science through the process of evaluation and cultivate values such as objectivity, integrity, open-mindedness and respect for evidence."}, {"phase": "Communication Learners communicate and justify their proposed explanations", "teacher": [{"text": "Facilitates whole-class knowledge building by synthesising findings across groups.", "tech": false, "level": 0}, {"text": "Use AI-enabled tools to synthesise findings across groups", "tech": true, "level": 0}, {"text": "Provides feedback on the quality of explanations and scientific arguments.", "tech": false, "level": 0}], "student": [{"text": "Communicate findings using evidence-based arguments.", "tech": false, "level": 0}, {"text": "Justify conclusions on how different variables affect the rate of reaction using experimental data and scientific concepts.", "tech": false, "level": 0}, {"text": "Engage in peer critique and collaborative knowledge construction.", "tech": false, "level": 0}, {"text": "Co-construct class explanations about factors affecting reaction rates.", "tech": false, "level": 0}], "aims": "[Understand] As students communicate findings and engage in peer critique, they develop values such as objectivity, integrity, and respect for evidence. [Appreciate] Through collaboration and discussion, students move beyond abstract knowledge and begin to see science as a meaningful driver of positive change. [Take Action] Through collaborative investigations, students develop strong communication and collaboration skills as they work effectively in teams to co-construct knowledge and share findings."}]}, "diff_table": {"type": "ibl_matrix", "features": [{"name": "Question", "teacher": ["Provides the question to be investigated and defines the focus of inquiry.", "Provides the question and supports students in clarifying its meaning and scope.", "Provides a set of investigable questions and supports students in selecting one for investigation.", "Provides a phenomenon, context, or problem that stimulates students to generate their own investigable questions."], "students": ["Accept given question and work on it", "Sharpen or clarify question provided", "Select among questions for investigation", "Pose an investigable question"]}, {"name": "Evidence", "teacher": ["Provides data and specifies procedures for analysis.", "Provides data and guides students in analysing it.", "Directs students to collect specific data and provides guidance on methods and tools.", "Supports investigation planning, provides resources and ensures safety, while students determine what evidence is needed."], "students": ["Are given data and told how to analyse", "Are given data and asked to analyse", "Are directed to collect certain data", "Determine what constitutes evidence and collects it"]}, {"name": "Explanation", "teacher": ["Provides the explanation and helps students connect evidence to the explanation.", "Provides possible ways to use evidence in constructing explanations.", "Guides students in the process of constructing explanations from evidence through questioning and scaffolding.", "Facilitates reflection and critique, allowing students to independently formulate explanations from evidence."], "students": ["Construct explanation with evidence provided", "Construct explanation supported by possible ways to formulate explanation", "Construction explanation from evidence with guidance in the process", "Formulate their own explanation after summarising evidence"]}, {"name": "Evaluation/Connections", "teacher": ["Provides scientific explanations and connections against which students compare their ideas.", "Suggests possible connections and alternative explanations for consideration.", "Directs students to relevant scientific sources, models, and knowledge for evaluating explanations.", "Encourages critical evaluation and comparison of multiple sources and explanations, while students establish connections independently."], "students": ["Evaluate explanations with provided connections", "Evaluate explanations with possible connections", "Evaluate explanations with directed sources of knowledge", "Examine other resources and form links to explanations"]}, {"name": "Communication", "teacher": ["Provides steps and procedures for communication", "Provides guidelines and criteria for communicating findings.", "Coaches students in scientific communication", "Provides opportunities and audiences for communicating"], "students": ["Communicate and justify their explanations with given steps and procedures for communication", "Communicate and justify their explanations supported by guidelines for communication", "Communicate and justify their explanations supported by teachers' coaching in the developing of communication", "Form reasonable and logical argument to communicate explanations"]}]}},cbl:{"what_is": [{"type": "bullet", "text": "Concept-based learning is about big transferable ideas, such as Disciplinary Ideas, that transcend context, location and time.", "tech": false, "level": 1}, {"type": "image", "src": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAiMAAAHOCAYAAABKGAlwAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAAFiUAABYlAUlSJPAAAJ3MSURBVHhe7d0HeBPlHwfwL1B2KbOFlr333tOyURAEBRmCiAwFBRTRP4oiiqDIkC0gykaZioBM2XvI3nu0bGhpodCR/72X95JLmqRJW0jafj/Pc3B3SZPL3fu+97v33ve9VAYFiIiIiNwktfyfiIiIyC0YjBAREZFbMRghIiIit2IwQkRERG7FYISIiIjcisEIERERuRWDESIiInIrjjNCRIni4YMHWLliBZ4+fYoWLVsif4EC8hUiIscYjBBRgty7dw/v9+yJi+fPqculc2bGqXvh6vzATwbjrbffVueJiOxhMEJE8XLyxHH0eOstREVFIWfGtBhWvzjK+GZRX7sVFoExey7hv1uh6vIHAwei01tdkT59enWZiEiPwQgROUUEHSuWLsGN6zeweNFC1MydGUWyZ0KdvNlRNEdm+S5L4c+isPzMLURERWPbtQeo1awVcvn5om69+ihXoYJ8FxGldAxGiMih48eO4b2ePRHxOBy+mdLhs9pFUClPVvmqa66EPMbMQ9ewJ+ghDEiFPu+/j7fffZc1JkQpHIMRIrLpyqVLePed7nh47x6806ZB1/J58Xppf/lqwlx/9AQD153Ew6dRSimUCr/OnYey5csjTZo08h1ElJIwGCEi1e1bt7D2nzUIDwvD6mVLUD5LauTxTo/6+XOot2Oeh2fRMdhy5R5O3g3DkVuhyFe+KipXrYryFSqiWo0aSpySSr6TiJIzBiNEKdyZ06fw9eef49y5c8iW3guvl8qDjmUD3BIIXHr4GF9uOYOb4c+QIVMmjJ84CdVr1pSvElFyxWCEKAVr3+ZVXLp4SZ0XbUGaFvFV590tMjoGgzedwvE7YeryJ0M+R8fOndV5Ikp+GIwQpRC3bt7Ent27cOzIEWxbvw4FM6VG9YBsaFAgO/J4Z5Dv8iz3nzzDfzdDcez2I+wIDkWBYqVQP/AlNG7aDAUKFpTvIqKkjsEIUTIXERGBHm91xtkzZ5E6FfBJrSJo5iE1IPHxwdrjOC0HVfvfF0PxRseO6jwRJV0MRoiSqePHjuKT/gNw9+4dtTfMj01Ko2j2TEpAkrQbhYoi63poBH7adwlHbj+Cd6ZMaNO+PT76ZLB8BxElNQxGiJKJJ0+eYN2aNThy+D8c3LcPBVM9VkdELe/rrf6f1IMQW8RtnC1X7uPRsyhsvhGGUjVqo0iRIqj/0ksoXaasfBcReToGI0RJ3NnTp9H7nbcRFhaODGlSY3KLsiiYNWOK7BZ79/FTDN1yFucfPEaGjBnRsUsXfDBgoHyViDwVgxGiJOro4cOYMmkCDu7bj4xeqfFOxfx4rWTuZFkD4qoLD8LxxeY 0LZX4R/nDJC4KoRtaoFSzhyi5bq3zDxHzGOKx+VXQeGxz9D011+UHmpGrRHXwIPStOBVrv92BE/+r6US1LxG5TchUfFa6H0aXn4XN//TQte2iFynmdD+8XHoFjs34F1d7lXJ4C9JVyeSQOmi86vHEiXEi5sTqHUTPi2iE9V2fqZhXb7T98WiIyEME4/TC6U62B6OE09pPzcTUE1pbFGN7HuOYIc60aXNd8jiscTS28kyiNiQrUqVKiyxlJ2JucDlU6NmYGe15E72xPv8c31/og2Hz+sUejIqIPIOoDQkwjldRuu/RWL1r6HlRLu7X70bwhN7oVy6bsv/FMRDnqY+NY4aMGoSvn0PtffIoiWVPlLi7Tnoo/25ov2opNrZ3YSQ/iofrOPB9O7w+tzAqTBjsYARSIvIkXl3HYsLG7/A18+wLYBwwcN3EQATKNYJX19EY+uem53ZbO5m0GSEiIqKkinXURERE5FYMRoiIiMitGIwQERGRWzEYISIiIrdiMEJERERuxWCEiIiI3Aj4PzOjaaX3891VAAAAAElFTkSuQmCC", "caption": ""}, {"type": "bullet", "text": "In CBL, students have opportunities to see connections among disparate facts and arrive at the larger disciplinary ideas.", "tech": false, "level": 1}, {"type": "bullet", "text": "The following questions are characteristic of CBL:", "tech": false, "level": 1}, {"type": "bullet", "text": "What patterns do you notice across these different examples?", "tech": false, "level": 1}, {"type": "bullet", "text": "How does this concept apply in other contexts you know?", "tech": false, "level": 1}, {"type": "bullet", "text": "What big idea connects all these specific cases?", "tech": false, "level": 1}, {"type": "bullet", "text": "How can you transfer this understanding to solve a new problem?", "tech": false, "level": 1}], "le_preamble": [{"text": "This LE is situated within a lesson which includes all the phases of CBL. (Not all lessons need to have all phases.)", "tech": false, "level": 0}, {"text": "In this lesson, students first 'Relate' to and 'Acquire' one concept associated with air resistance.", "tech": false, "level": 0}, {"text": "They then 'Connect' to other concepts (e.g. resultant force, acceleration) which are taught in previous lessons through a generalization ('Forces help us understand motion').", "tech": false, "level": 0}, {"text": "In this lesson, they also 'Transfer' their learning to other contexts.", "tech": false, "level": 0}, {"text": "In a self-directed digital environment, the role traditionally played by the teacher to facilitate socratic questioning, metacognitive reflection and introducing counter cases for transfer is enabled by EdTech features such as SLS components (e.g. Free Response Questions, Discussion), SALiS (the SLS chatbot), and HTML5 interactives.", "tech": false, "level": 0}, {"text": "The 'Tech' descriptors illustrate the learning experience with EdTech is used (i) in-class and (ii) when designed as an Elective Module (EM).", "tech": false, "level": 0}], "diff_preamble": [{"text": "The above learning experience can be differentiated for different student profiles as follows. The essence of CBL is preserved in all variations - students construct the generalisations."}, {"text": "Within the same class, there could be students of different readiness, and teachers can provide differentiated instruction at different phases."}], "phase_table": {"col_headers": ["Phase", "Teachers' Role", "Students' Role", "Relevance of CBL"], "teacher_col": 1, "student_col": 2, "aims_col": 3, "rows": [{"phase": "Relate to students' prior knowledge and lived experiences", "teacher": [{"text": "Pose a challenge that draws on prior knowledge / lived experience", "tech": false, "level": 0}, {"text": "\"How can you make a single sheet of paper fall at the same rate as a ream of paper?", "tech": false, "level": 1}, {"text": "A 'Discussion' could be set up on SLS for students to make their thinking visible in-class. Teacher can then use 'Data Assistant' to consolidate their responses and generate a whole-class overview.", "tech": true, "level": 0}, {"text": "In an Elective Module, the SLS chatbot could be configured as a Socratic questioner, probing student reasoning using prompts like \"What did you try? / Why did you think that would work? / What did you observe? / Why did you think your method worked / not work?\" The chatbot could also be activated in-class, within the 'Live Chat' for each small group of students in-class.", "tech": true, "level": 0}], "student": [{"text": "Generate ideas and investigate using the sheet of paper and ream of paper provided.", "tech": false, "level": 0}], "aims": "[Appreciate] When real-world contexts are used to illustrate concepts, students can see the relevance of science."}, {"phase": "Acquire knowledge of single concepts through meaning making", "teacher": [{"text": "Sequence cases and phenomena", "tech": false, "level": 0}, {"text": "\"What do you predict will happen when we drop a bowling ball and a feather at the same time?\"", "tech": false, "level": 1}, {"text": "\"Now what do you predict will happen in a vacuum?\"", "tech": false, "level": 1}, {"text": "To make students' thinking visible, a 'Discussion' could sequence the bowling ball and feather videos with prediction prompts between each: \"Predict, then observe. What surprised you?\" Teacher can then use 'Data Assistant' to get a consolidated in-class overview.", "tech": true, "level": 0}, {"text": "An HTML5 interactive could allow students to vary mass and surface area and observe the effect on fall rate.", "tech": true, "level": 0}, {"text": "In an Elective Module, the SLS chatbot could be configured as a Socratic questioner using prompts like \"What pattern did you notice in the interactive? / Does this match what you saw in the video? / What concept might explain this?\" The chatbot could also be activated in-class, within the 'Live Chat' for each small group of students.", "tech": true, "level": 0}], "student": [{"text": "Predict, observe, and make meaning", "tech": false, "level": 0}], "aims": "[Appreciate] When real-world contexts are used to illustrate concepts, students can see the relevance of science."}, {"phase": "Connect different concepts", "teacher": [{"text": "(Other related concepts (e.g. weight, free body diagram, acceleration, net force) taught in previous lessons.)", "tech": false, "level": 0}, {"text": "Provide the context", "tech": false, "level": 0}, {"text": "\"Why does the skydiver change his posture during the rescue?\"", "tech": false, "level": 1}, {"text": "\"Can you use a free body diagram to show what is happening to the forces?\"", "tech": false, "level": 1}, {"text": "\"What would help explain motion?\"", "tech": false, "level": 1}, {"text": "A 'Discussion' presents the skydiving video with minimal framing: \"Why does the skydiver change posture? Use the interactive if it helps.\"", "tech": true, "level": 0}, {"text": "A dynamically-linked HTML5 interactive showing multiple representations could be made available but students decide how to use it. Teacher could use the interactive in-class with the overview of responses generated by 'Data Assistant'.", "tech": true, "level": 0}, {"text": "In an Elective Module, SLS chatbot is configured as a Socratic questioner, probing the student's emerging generalisation without confirming it: \"What could help explain motion? \"You wrote that more air resistance slows the skydiver down. Is that always true?\" \"What does your free body diagram show about the net force when air resistance equals weight?\" \"How would you refine your statement to account for that?\" The chatbot could also be activated in-class, within the 'Live Chat' for each small group of students.", "tech": true, "level": 0}], "student": [{"text": "Generate the relationship question and construct the generalisation with facilitation", "tech": false, "level": 0}], "aims": "[Understand Disciplinary Ideas] CBL is explicitly designed to develop deep conceptual understanding of Disciplinary Ideas that transcend context. The process of connecting isolated facts to big ideas cultivates curiosity and open-mindedness."}, {"phase": "Transfer learning to novel contexts and the real world", "teacher": [{"text": "Provide the transfer context", "tech": false, "level": 0}, {"text": "\"What do you notice when the parachute opens?\" (skydiver seen to fly upwards)", "tech": false, "level": 1}, {"text": "\"Can you explain this in your own words using what you have established?\"", "tech": false, "level": 1}, {"text": "\"Where else in the real world might your generalisation apply?\"", "tech": false, "level": 1}, {"text": "Students could individually replay the video embedded on SLS to observe the motion of the skydiver when the parachute is displayed.", "tech": true, "level": 0}, {"text": "Students could also use the above-mentioned HTML5 interactive to evaluate their transfer.", "tech": true, "level": 0}, {"text": "SLS chatbot could be configured as a Socratic questioner, probing the student's explanation and adaptively introducing a further transfer context based on the quality of the response: \"What do you notice when the parachute opens? Explain this in your own words using your generalisation. / You said the skydiver moves upwards. Does your generalisation predict this? Walk me through it. / Your explanation holds here. Can you think of another real-world situation where the same generalisation applies?\"", "tech": true, "level": 0}, {"text": "Provide additional contexts through worksheets and past-year questions.", "tech": false, "level": 0}, {"text": "These formative assessment items could be in the form of different SLS Question types. The corresponding AI-feedback assistants (e.g. ShortAnsFA, Annotated FA) could also be enabled.", "tech": true, "level": 0}, {"text": "Relate to NOS through reflection prompts", "tech": false, "level": 0}, {"text": "\"How does this learning experience reveal about how scientific knowledge is built, tested and revised?\"", "tech": false, "level": 1}, {"text": "In an Elective Module, this question could be posed as a Free Response Question, with a suggested answer.", "tech": true, "level": 0}], "student": [{"text": "Explain the discrepant event and identify further contexts themselves", "tech": false, "level": 0}], "aims": "[Take Action] Inquiring like scientists, students study, analyse, compare, and organise information that has been curated for them, identifying patterns, discerning the structure of a concept and identifying the instances when that new knowledge should be used. [Understand Practices of Science] CBL supports W7 (using and developing models) and W8 (constructing explanations) as students organise knowledge hierarchically. It also supports N1-N2 (understanding scientific knowledge as model-building with order and consistency)."}]}, "diff_table": {"type": "standard", "headers": ["Stage", "Role", "For lower readiness students", "For higher readiness students"], "stages": [{"stage": "Relate", "teacher_lower": "activates prior knowledge through targeted questions", "teacher_higher": "presents a puzzling phenomenon with no framing", "student_lower": "respond within a teacher-defined frame.", "student_higher": "make their own connections to prior knowledge."}, {"stage": "Acquire", "teacher_lower": "controls case selection: examples and non-examples", "teacher_higher": "presents raw, unsorted cases;", "student_lower": "identify shared attributes and name the concept.", "student_higher": "sort, name, and explain the concept independently."}, {"stage": "Connect", "teacher_lower": "provides the relationship question", "teacher_higher": "provides a minimal prompt", "student_lower": "construct the generalisation in response", "student_higher": "identify the relevant concepts, generate the relationship question, and construct the generalisation independently."}, {"stage": "Transfer", "teacher_lower": "provides the transfer context and directs students to apply their generalisation to it", "teacher_higher": "provides minimal prompt", "student_lower": "Apply generalisation to the transfer context", "student_higher": "students identify their own transfer context, apply the generalisation, and evaluate its limits."}], "has_role_col": true, "unnamed_sentinel": "__UNNAMED__"}},ssi:{"what_is": [{"type": "bullet", "text": "Socio-Scientific Issue-based Learning (SSI-L) is a pedagogical approach where students learn science through engaging with authentic, open-ended and socially relevant issues that are closely connected to scientific knowledge. These issues often involve ethical, social, economic, environmental or political considerations, and usually do not have a single correct answer.", "tech": false, "level": 0}, {"type": "bullet", "text": "SSI-L is especially useful when the issue:", "tech": false, "level": 0}, {"type": "bullet", "text": "is authentic and meaningful to students", "tech": false, "level": 1}, {"type": "bullet", "text": "is connected to scientific concepts, evidence and practices", "tech": false, "level": 1}, {"type": "bullet", "text": "involves ethical, societal or environmental implications", "tech": false, "level": 1}, {"type": "bullet", "text": "requires students to consider multiple perspectives and trade-offs", "tech": false, "level": 1}, {"type": "bullet", "text": "allows for more than one defensible position", "tech": false, "level": 1}, {"type": "bullet", "text": "supports students in making informed decisions and taking responsible action", "tech": false, "level": 1}, {"type": "bullet", "text": "SSI-L helps students move beyond learning science as a body of knowledge. It enables them to apply scientific understanding to real-world issues, evaluate evidence, reason through trade-offs, and justify decisions using both scientific and ethical considerations.", "tech": false, "level": 0}, {"type": "bullet", "text": "A typical SSI-L learning experience involves three connected phases:", "tech": false, "level": 0}, {"type": "bullet", "text": "Encountering a Focal Issue", "tech": false, "level": 0}, {"type": "bullet", "text": "Students encounter a meaningful socio-scientific issue and develop awareness of its scientific and societal dimensions.", "tech": false, "level": 0}, {"type": "bullet", "text": "Engaging with key Ideas and Practices", "tech": false, "level": 0}, {"type": "bullet", "text": "Students develop and apply Disciplinary Core Ideas, Scientific Practices and Crosscutting Concepts while engaging in socio-scientific reasoning. This includes considering evidence, stakeholders, perspectives, values, uncertainty and the limitations of science.", "tech": false, "level": 0}, {"type": "bullet", "text": "Synthesising Key Ideas and Practices", "tech": false, "level": 0}, {"type": "bullet", "text": "Students draw together their scientific understanding and reasoning to develop, communicate and justify a position, recommendation, policy, solution or course of action.", "tech": false, "level": 0}, {"type": "image", "src": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA2UAAAQ+CAIAAADQ+gC+AAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAAIdUAACHVAQSctJ0AAP+lSURBVHhe7J0HfBPVH8C7MptO9l4Cihu34sKJygYZDhBEce+JgCiiorgHqLgnAoLsJSAoe9ORNk2bNntfLrnksvr/vXfJ9XJJS4Ey+vf9Pl9Cennv3XvvLve+uZkWJUGCBAkSJEiQIEGinqitrSW+SIIECRIkSJAgQaLeIL5IggQJEiRIkCBBoqEgvkiCBAkSJEiQIEGioSC+SIIECRIkSJAgQaKhIL5IggQJEiRIkCBBoqEgvkiCBAkSJEiQIEGioSC+SIIECRIkSJAgQaKhIL5IggQJEiRIkCBBoqEgvkiCBAkSJEiQIEGioSC+SIIECRIkSJAgQaKhIL5IggQJEiRIkCBBoqEgvkiCBAkSJEiQIEGioSC+SIIECRIkSJAgQaKhIL5IggQJEiRIkCBBoqEgvkiCBAkSJEiQIEGioSC+SIIECRIkSJAgQaKhIL5IggQJEiRIkCBBoqEgvkiCBAkSJEiQIEGioSC+SIIECRIkSJAgQaKhIL5IggQJEiRIkCBBoqEgvkiCBAkSJEiQIEGioSC+SIIECRIkSJAgQaKhIL5IggQJEiRIkCBBoqEgvkiCBAkSJEiQIEHiCEF8kQQJEiRIkCBBgkRDQXyRBAkSJEiQIEGCRENBfJEECRIkSJAgQYJEQ0F8kQQJEiT+Q1HbiIglJUGCBAkcsFkgvkiCBAkS/6HgjLDhiCUlQYIECRywWSC+SIIECRL/oeCMsOGIJSVBggQJHLBZIL5IggQJEiRIkCBBot4gvkiCBAkSJEiQIEGioSC+SIIECRIkSJAgQaKhIL5IggQJEv+tiDQuYqnrD0gRrkWvJEiQ+C9Ec/ZF2FAJIUGCBAkSR4qYD3IRjpMUsdT85pX7n5+M3kbCtZEwNzkhy5GDSw+B/8CQIEHi9I7m7IvhCADbK7TJ4ogSRCSHKEFKRBtv0acEwv8rydoCU0RpUiKMRmY5ZUQioTrCiBAQASLh+KYUiRzqDL4tIIe1GK6NKLAvcjmiODu855IeIXB6NPsw3mjHNuAkSJA4vaO5+SK3FcOmGA2HwsEA46V8XifLeqMRNhrlCCTCTQzCNioOt1kTAp+KECUA+PJ5IBlfJoewBB5hIVyyQCTqTyASiETYBMStAGCO/Iw4RDPiEM6OC67XOLiMUBQU6I8XK2oLZEzOAgjnwiOcHQdXoBBIxhfCFyVKA4jSAKIEQHJRogQcojSNmR3UnH/DvYdcCOFyCUf84YgvHGFgqcV7D9JwWYQIZ8Rx4moOiBIAybNrZFHcyiYEkkFeIcISeETlpEwmSg  "This LE is situated within a lesson which includes all components of the SSI-L framework. (Note: Not all lessons need to have all components)", "tech": false, "level": 0}, {"text": "SSI Ethical Dilemma: Should vaccination against Disease X be compulsory in Singapore?", "tech": false, "level": 0}, {"text": "Disease X is a novel disease. It is highly contagious and can lead to serious respiratory problems or even death, especially in people who have weaker immune systems. Many patients would need to be hospitalised as they will require respiratory support. The vaccine for Disease X has been recently developed and can be used for ages 12 years and above.", "tech": false, "level": 0}, {"text": "You will now take on the roles of lawmakers in Singapore and imagine that you are in the situation where Singapore has many Disease X infections. The vaccine against Disease X has just been developed and approved for use by the World Health Organization.", "tech": false, "level": 0}], "diff_preamble": [{"text": "The above LE can be differentiated based on student readiness."}, {"text": "The essence of SSI-L is preserved in the differentiation, where students will engage with authentic socio-scientific issues, apply their scientific understanding, explore multiple perspectives and engage in ethical reasoning to make informed decisions as a scientifically literate citizen."}], "phase_table": {"col_headers": ["Stage", "Teacher's Role", "Students' Role", "Alignment of SSI-L to the 3 aims"], "teacher_col": 1, "student_col": 2, "aims_col": 3, "rows": [{"phase": "Encountering a Focal Issue", "teacher": [{"text": "Teacher presents the SSI - Should vaccination against Disease X be made compulsory, to provide context to the lesson. For students to make a decision as lawmakers, they need to learn more about vaccination in Singapore first.", "tech": false, "level": 0}, {"text": "The SSI is presented first to build instruction around a compelling issue that connects to both science ideas and societal concerns", "tech": false, "level": 0}, {"text": "Teacher shows students Interactive or Excel Immunisation chart against various diseases based on age in Singapore.", "tech": true, "level": 0}, {"text": "Teacher prompts students to generate questions and from conclusions from the chart.", "tech": false, "level": 0}, {"text": "Teacher prompts students to think why vaccines against diphtheria and measles are compulsory in Singapore.", "tech": false, "level": 0}, {"text": "Teacher introduces students to the Singapore Infectious Disease Act.", "tech": false, "level": 0}], "student": [{"text": "Students generate questions and form conclusions from the chart.", "tech": false, "level": 0}, {"text": "Students generate reasons as to why vaccinations against diphtheria and measles are compulsory in Singapore, but other vaccines are recommended.", "tech": false, "level": 0}, {"text": "In doing so, students begin to develop awareness of the ways in which science ideas have bearing on the issue, as well as the social concerns that emerge from it", "tech": false, "level": 0}, {"text": "Students can interact with AI-Chatbot to learn more about the Singapore Infectious Disease Act as well as the diseases featured in the chart.", "tech": true, "level": 0}, {"text": "Padlet, SLS DAT or Classpoint can be used to collate and summarise students' responses.", "tech": true, "level": 0}], "aims": "[Understand] Students' prior knowledge is activated Students are engaged in formulating conclusions and explanations from data, mirroring authentic scientific practices. [Appreciate] Students appreciate vaccination through their lived experience of the COVID-19 pandemic, providing a meaningful entry point for appreciating how scientific knowledge shapes public health decisions."}, {"phase": "Engaging with Key Ideas and Practices", "teacher": [{"text": "Teacher groups students to carry out Jigsaw learning to learn more about vaccination and their impacts.", "tech": false, "level": 0}, {"text": "Teacher supports students in using digital tools to consolidate learning and providing different media resources to support the different learning preferences of students.", "tech": true, "level": 0}, {"text": "Teacher gets students to form individual positions on the SSI - Should vaccination against Disease X be made compulsory in Singapore?", "tech": false, "level": 0}, {"text": "Teacher can use tools such as Mentimeter or Classpoint to provide visualisation of the class responses.", "tech": true, "level": 0}, {"text": "Teacher introduces the four bioethical principles that serve as a guide for making reasoned judgements.", "tech": false, "level": 0}, {"text": "Respect for Persons", "tech": false, "level": 1}, {"text": "Justice", "tech": false, "level": 1}, {"text": "Minimise Harm", "tech": false, "level": 1}, {"text": "Maximise Benefits", "tech": false, "level": 1}, {"text": "These principles support socio-scientific reasoning by helping students account for the complexity of the socio-scientific issues and analyse it from multiple perspectives.", "tech": false, "level": 0}, {"text": "Teacher guides students to classify the reasons under each bioethical principle.", "tech": false, "level": 0}, {"text": "Teacher facilitates whole-class discussion on categorising the reasons under the principles, as well as highlighting reasons that do not fall under any of the principles.", "tech": false, "level": 0}, {"text": "Teacher may use AI-supported tools to summarise discussion board responses, identify common patterns, or surface contrasting explanations for discussion.", "tech": true, "level": 0}, {"text": "Teacher also scaffolds students to employ skepticism when analysing information sources and to consider dimensions of the issue that remain subject to ongoing scientific inquiry.", "tech": false, "level": 0}], "student": [{"text": "Students generate reasons to support their position.", "tech": false, "level": 0}, {"text": "Tools such as Mentimeter or Classpoin const APPROACH_META={
  pbl:{name:'Problem-Based Learning',color:'--pbl',light:'--pbl-light',mid:'--pbl-mid'},
  ibl:{name:'Inquiry-Based Learning',color:'--ibl',light:'--ibl-light',mid:'--ibl-mid'},
  cbl:{name:'Concept-Based Learning',color:'--cbl',light:'--cbl-light',mid:'--cbl-mid'},
  ssi:{name:'Socio-Scientific Issues-based Learning',color:'--ssi',light:'--ssi-light',mid:'--ssi-mid'},
};
const UNNAMED='__UNNAMED__';

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── bullet rendering with sub-levels ──────────────────────────────────────
function renderBullets(items, showTech) {
  if (!items || !items.length) return '';
  // filter tech first
  const visible = showTech ? items : items.filter(b => !b.tech);
  if (!visible.length) return '';

  // Build nested structure: group consecutive sub-items under their parent
  let html = '<ul class="bullet-list">';
  let i = 0;
  while (i < visible.length) {
    const b = visible[i];
    if (b.level === 0) {
      const badge = b.tech ? `<span class="tech-badge">Tech</span> ` : '';
      const cls = b.tech ? ' class="tech-item"' : '';
      html += `<li${cls}>${badge}${esc(b.text)}`;
      // collect any following level-1 items as a nested list
      let subs = [];
      let j = i + 1;
      while (j < visible.length && visible[j].level >= 1) {
        subs.push(visible[j]); j++;
      }
      if (subs.length) {
        html += '<ul>';
        subs.forEach(s => {
          const sbadge = s.tech ? `<span class="tech-badge">Tech</span> ` : '';
          const scls = s.tech ? ' class="tech-item"' : '';
          html += `<li${scls}>${sbadge}${esc(s.text)}</li>`;
        });
        html += '</ul>';
        i = j;
      } else {
        i++;
      }
      html += '</li>';
    } else {
      // orphan sub-item (no parent at level 0 before it)
      const badge = b.tech ? `<span class="tech-badge">Tech</span> ` : '';
      const cls = b.tech ? ' class="tech-item"' : '';
      html += `<li${cls} style="list-style:circle;margin-left:1.1em">${badge}${esc(b.text)}</li>`;
      i++;
    }
  }
  html += '</ul>';
  return html;
}

function renderWhatIs(items) {
  if (!items || !items.length) return '';
  let html = '', inList = false;
  const cl = () => { if (inList) { html += '</ul>'; inList = false; } };
  for (const item of items) {
    if (item.type === 'image') {
      cl();
      html += `<figure class="what-is-image"><img src="${item.src}" alt="Diagram">${item.caption ? `<figcaption>${esc(item.caption)}</figcaption>` : ''}</figure>`;
    } else {
      if (!inList) { html += '<ul class="what-is-bullets">'; inList = true; }
      const cls = item.level >= 1 ? ' class="sub"' : '';
      html += `<li${cls}>${esc(item.text)}</li>`;
    }
  }
  cl(); return html;
}

function renderKeyQuestion(kq) {
  if (!kq) return '';
  const colon = kq.indexOf(':');
  let label = kq, body = '';
  if (colon > -1) {
    const full = kq.slice(0, colon + 1);
    const rest = kq.slice(colon + 1).trim();
    const sentEnd = rest.search(/[.?!]/);
    if (sentEnd > -1) { label = full + ' ' + rest.slice(0, sentEnd + 1); body = rest.slice(sentEnd + 1).trim(); }
    else { label = full; body = rest; }
  }
  return `<div class="key-question"><strong>${esc(label)}</strong>${esc(body)}</div>`;
}

function renderLePreamble(items) {
  if (!items || !items.length) return '';
  const li = items.map(i => `<li${i.level >= 1 ? ' class="sub"' : ''}>${esc(i.text)}</li>`).join('');
  return `<div class="le-preamble"><ul>${li}</ul></div>`;
}

function renderDiffPreamble(items) {
  if (!items || !items.length) return '';
  return `<div class="diff-preamble"><ul>${items.map(i => `<li>${esc(i.text)}</li>`).join('')}</ul></div>`;
}

// ── phase table ────────────────────────────────────────────────────────────
function renderPhaseTable(pt, showTech) {
  if (!pt || !pt.rows || !pt.rows.length) return '';
  const ths = pt.col_headers.map(h => `<th>${esc(h)}</th>`).join('');
  const trs = pt.rows.map(r => {
    const th = renderBullets(r.teacher, showTech);
    const st = renderBullets(r.student, showTech);
    return `<tr>
      <td class="phase-label">${esc(r.phase)}</td>
      <td><div class="cell-scroll">${th}</div></td>
      <td><div class="cell-scroll">${st}</div></td>
      ${r.aims !== undefined ? `<td class="aims-cell">${esc(r.aims)}</td>` : ''}
    </tr>`;
  }).join('');
  return `<div class="phase-table-wrap"><table class="phase-tbl" cellspacing="0"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
}

function renderPhaseCards(pt, showTech) {
  if (!pt || !pt.rows || !pt.rows.length) return '';
  const l2 = pt.col_headers[pt.teacher_col] || "Teacher's Role";
  const l3 = pt.col_headers[pt.student_col] || "Students' Role";
  const cards = pt.rows.map(r => {
    const th = renderBullets(r.teacher, showTech);
    const st = renderBullets(r.student, showTech);
    return `<div class="phase-card">
      <h3>${esc(r.phase)}</h3>
      ${th ? `<div class="card-role">${esc(l2)}</div>${th}` : ''}
      ${st ? `<div class="card-role">${esc(l3)}</div>${st}` : ''}
      ${r.aims ? `<div class="card-role">3 Aims</div><p style="font-size:.78rem;color:var(--slate)">${esc(r.aims)}</p>` : ''}
    </div>`;
  }).join('');
  return `<div class="cards-grid">${cards}</div>`;
}

// ── diff tables ────────────────────────────────────────────────────────────
function renderDiffStandard(dt, key) {
  if (!dt || !dt.stages || !dt.stages.length) return '';
  const phaseRows = ((APPROACH_DATA[key].phase_table) || {}).rows || [];
  const firstName = phaseRows.length ? phaseRows[0].phase : 'Stage 1';
  const ths = dt.headers.map(h => `<th>${esc(h)}</th>`).join('');
  let rows = '';
  dt.stages.forEach((s, i) => {
    const name = s.stage === UNNAMED ? firstName : s.stage;
    if (dt.has_role_col) {
      rows += `<tr>
        <td class="diff-stage" rowspan="2">${esc(name)}</td>
        <td class="diff-role">Teacher</td>
        <td>${esc(s.teacher_lower || '')}</td>
        <td>${esc(s.teacher_higher || '')}</td>
      </tr><tr>
        <td class="diff-role">Students</td>
        <td>${esc(s.student_lower || '')}</td>
        <td>${esc(s.student_higher || '')}</td>
      </tr>`;
    } else {
      rows += `<tr>
        <td class="diff-stage">${esc(name)}</td>
        <td>${esc(s.lower || '')}</td>
        <td>${esc(s.higher || '')}</td>
      </tr>`;
    }
  });
  return `<div style="overflow-x:auto"><table class="diff-tbl" cellspacing="0"><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderDiffIBL(dt) {
  if (!dt || !dt.features || !dt.features.length) return '';
  let rows = '';
  dt.features.forEach(f => {
    const ts = (f.teacher || []).map(c => `<td>${esc(c)}</td>`).join('');
    const ss = (f.students || []).map(c => `<td>${esc(c)}</td>`).join('');
    rows += `<tr class="trow"><td class="fcell" rowspan="2">${esc(f.name)}</td><td class="rcell">Teacher</td>${ts}</tr>
    <tr class="srow"><td class="rcell">Students</td>${ss}</tr>`;
  });
  return `<div style="overflow-x:auto"><table class="ibl-matrix" cellspacing="0">
    <thead>
      <tr>
        <th class="fhdr" rowspan="2">Essential Feature</th>
        <th class="rhdr" rowspan="2">Role</th>
        <th colspan="4">Extent of Guidance from Teacher &#8592; More &nbsp;&nbsp; Less &#8594;</th>
      </tr>
      <tr class="ibl-arrow-row">
        <th>Highly structured</th><th>Guided</th><th>Structured inquiry</th><th>Open inquiry</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderDiff(key) {
  const dt = APPROACH_DATA[key].diff_table;
  if (!dt) return '';
  return dt.type === 'ibl_matrix' ? renderDiffIBL(dt) : renderDiffStandard(dt, key);
}

function hasTech(key) {
  const pt = APPROACH_DATA[key].phase_table;
  if (!pt) return false;
  return pt.rows.some(r => [...(r.teacher || []), ...(r.student || [])].some(b => b.tech));
}

// ── accordion ──────────────────────────────────────────────────────────────
function accordion(id, label, body) {
  return `<div class="accordion">
    <button class="acc-btn" onclick="toggleAcc('${id}')">
      <span>${label}</span><span class="acc-arrow">&#9660;</span>
    </button>
    <div class="acc-body" id="${id}">${body}</div>
  </div>`;
}

// ── build panel ────────────────────────────────────────────────────────────
function buildPanel(key) {
  const data = APPROACH_DATA[key];
  const meta = APPROACH_META[key];
  const showTech = false; // default OFF

  // Accordion 1
  const a1 = accordion(`${key}-what`, `What is ${meta.name}?`, renderWhatIs(data.what_is || []));

  // Accordion 2
  let le = '';
  le += renderKeyQuestion(data.key_question || null);
  le += renderLePreamble(data.le_preamble || []);

  const hasTable = !!(data.phase_table && data.phase_table.rows && data.phase_table.rows.length);
  const ht = hasTech(key);

  if (hasTable || ht) {
    let tb = `<div class="phase-toolbar">`;
    if (hasTable) {
      tb += `<button class="ctrl-btn active" id="${key}-bt" onclick="setView('${key}','table')">&#9776; Table</button>`;
      tb += `<button class="ctrl-btn" id="${key}-bc" onclick="setView('${key}','cards')">&#9783; Cards</button>`;
    }
    if (ht) {
      // slider toggle, OFF by default
      tb += `<label class="toggle-wrap" title="Show or hide technology suggestions">
        <input type="checkbox" id="${key}-btech" onchange="onTechToggle('${key}')">
        <span class="toggle-track"></span>
        Show Tech
      </label>`;
    }
    if (hasTable) {
      tb += `<button class="ctrl-btn" id="${key}-bexp" onclick="toggleExpandAll('${key}')">Expand all rows</button>`;
    }
    tb += `</div>`;
    le += tb;
  }

  if (hasTable) {
    // Render with showTech=false (initial state)
    le += `<div id="${key}-view" class="view-table tech-hidden">`;
    le += renderPhaseTable(data.phase_table, true); // render all, CSS hides tech-items
    le += renderPhaseCards(data.phase_table, true);
    le += `</div>`;
  }
  const a2 = accordion(`${key}-le`, 'LE facilitated by a teacher in the classroom', le);

  // Accordion 3
  let diff = renderDiffPreamble(data.diff_preamble || '') + renderDiff(key);
  const a3 = accordion(`${key}-diff`, 'Differentiating Instruction', diff);

  return a1 + a2 + a3;
}

function setAccent(el, meta) {
  el.style.setProperty('--accent', `var(${meta.color})`);
  el.style.setProperty('--accent-light', `var(${meta.light})`);
  el.style.setProperty('--accent-mid', `var(${meta.mid})`);
}

function init() {
  const panelsEl = document.getElementById('panels');
  Object.keys(APPROACH_DATA).forEach(key => {
    const div = document.createElement('div');
    div.className = 'panel'; div.id = `panel-${key}`;
    div.innerHTML = buildPanel(key);
    panelsEl.appendChild(div);
    setAccent(div, APPROACH_META[key]);
  });
  activateTab('pbl');
}

function activateTab(key) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === `panel-${key}`));
}
document.querySelector('.tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (btn) activateTab(btn.dataset.key);
});

function toggleAcc(id) {
  const body = document.getElementById(id);
  const btn = body.previousElementSibling;
  const open = body.classList.toggle('open');
  btn.classList.toggle('open', open);
}

function setView(key, mode) {
  const v = document.getElementById(`${key}-view`); if (!v) return;
  // preserve tech-hidden class
  const techHidden = v.classList.contains('tech-hidden');
  v.className = `view-${mode}${techHidden ? ' tech-hidden' : ''}`;
  document.getElementById(`${key}-bt`).classList.toggle('active', mode === 'table');
  document.getElementById(`${key}-bc`).classList.toggle('active', mode === 'cards');
}

function onTechToggle(key) {
  const chk = document.getElementById(`${key}-btech`);
  const v = document.getElementById(`${key}-view`); if (!v) return;
  v.classList.toggle('tech-hidden', !chk.checked);
}

const expandState = {};
function toggleExpandAll(key) {
  const v = document.getElementById(`${key}-view`);
  const btn = document.getElementById(`${key}-bexp`); if (!v) return;
  const exp = !expandState[key]; expandState[key] = exp;
  // toggle max-height on all scrollable cells
  v.querySelectorAll('.cell-scroll').forEach(c => {
    c.style.maxHeight = exp ? 'none' : '200px';
  });
  btn.textContent = exp ? 'Collapse rows' : 'Expand all rows';
  btn.classList.toggle('active', exp);
}

init();
</script>
