<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedagogical Approaches</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --sage:#4a6741;--sage-light:#e8efe7;--sage-mid:#b8ceb5;
  --slate:#2c3e50;--slate-mid:#5a6a7a;--slate-light:#f0f3f6;
  --paper:#faf9f6;--white:#ffffff;
  --tech-bg:#e8f4fd;--tech-border:#4a90c4;--tech-text:#1a5272;
  --border:#dde3e8;--text:#1e2a35;--text-muted:#6b7a8a;
  --radius:8px;--cell-max-h:180px;
  --shadow:0 1px 4px rgba(0,0,0,0.06),0 2px 10px rgba(0,0,0,0.04);
  --shadow-md:0 4px 18px rgba(0,0,0,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--paper);color:var(--text);line-height:1.65;font-size:15px;}
header{background:var(--slate);color:#fff;padding:22px 40px;border-bottom:3px solid var(--sage);}
header h1{font-family:"Libre Baskerville",serif;font-size:1.35rem;font-weight:700;letter-spacing:-.01em;}
.approach-tabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 40px;display:flex;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.approach-tab{padding:14px 20px;font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--slate-mid);cursor:pointer;border-bottom:3px solid transparent;transition:all .18s;white-space:nowrap;position:relative;top:1px;user-select:none;}
.approach-tab:hover{color:var(--sage);}
.approach-tab.active{color:var(--sage);border-bottom-color:var(--sage);}
.approach-tab.coming-soon{color:#b8c8d0;cursor:default;}
.approach-tab.coming-soon::after{content:"soon";font-size:.58rem;background:#e4eaed;color:#9aaab5;padding:1px 5px;border-radius:8px;margin-left:5px;letter-spacing:.04em;vertical-align:1px;}
.approach-panel{display:none;}
.approach-panel.active{display:block;}
.content-wrap{max-width:1100px;margin:0 auto;padding:28px 40px 64px;}
/* ACCORDION */
.accordion{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden;}
.accordion-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;user-select:none;transition:background .15s;gap:12px;}
.accordion-hdr:hover{background:var(--slate-light);}
.accordion-hdr h2{font-family:"Libre Baskerville",serif;font-size:.92rem;font-weight:700;color:var(--slate);}
.acc-chev{color:var(--text-muted);font-size:.68rem;flex-shrink:0;transition:transform .22s;}
.accordion.open .acc-chev{transform:rotate(180deg);}
.accordion-body{display:none;border-top:1px solid var(--border);padding:18px 20px;}
.accordion.open .accordion-body{display:block;}
/* WHAT IS content */
.def-para{font-size:.9rem;line-height:1.72;margin-bottom:14px;}
.sub-head{font-size:.72rem;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 7px;}
.plain-list{list-style:disc;padding-left:18px;}
.plain-list li{font-size:.875rem;padding:2px 0;}
.q-list{list-style:disc;padding:10px 14px 10px 30px;background:#f7f9f8;border:1px solid var(--sage-mid);border-radius:6px;margin-top:4px;}
.q-list li{padding:3px 0;font-size:.86rem;font-style:italic;color:var(--slate-mid);}
/* KEY QUESTION */
.key-q-box{background:linear-gradient(135deg,#f0f6ef,#e7f0e5);border-left:4px solid var(--sage);border-radius:0 6px 6px 0;padding:16px 18px;margin:14px 0 4px;}
.key-q-lbl{font-size:.63rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage);margin-bottom:5px;}
.key-q-q{font-family:"Libre Baskerville",serif;font-size:.93rem;font-style:italic;color:var(--slate);font-weight:700;margin-bottom:9px;line-height:1.5;}
.key-q-body{font-size:.84rem;color:var(--slate-mid);line-height:1.72;}
.key-q-body p+p{margin-top:9px;}
.key-q-more{display:none;}
.key-q-btn{background:none;border:none;color:var(--sage);font-size:.78rem;font-weight:600;cursor:pointer;margin-top:7px;padding:0;font-family:inherit;display:inline-flex;align-items:center;gap:4px;}
.key-q-btn:hover{text-decoration:underline;}
.seq-list{list-style:disc;padding-left:18px;margin:4px 0 14px;}
.seq-list li{font-size:.9rem;padding:3px 0;}
/* PHASES HEADER */
.phases-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin:24px 0 12px;padding-bottom:12px;border-bottom:2px solid var(--border);}
.phases-hdr h2{font-family:"Libre Baskerville",serif;font-size:1.02rem;color:var(--slate);}
.phases-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
/* TECH TOGGLE */
.tech-toggle{display:inline-flex;align-items:center;gap:7px;padding:6px 13px 6px 11px;background:var(--white);border:1.5px solid var(--border);border-radius:20px;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--slate-mid);transition:all .18s;font-family:inherit;}
.tech-toggle:hover{border-color:var(--tech-border);color:var(--tech-text);}
.tech-toggle.on{background:var(--tech-bg);border-color:var(--tech-border);color:var(--tech-text);}
.toggle-track{width:24px;height:13px;background:#c5d3db;border-radius:7px;position:relative;transition:background .18s;flex-shrink:0;}
.tech-toggle.on .toggle-track{background:var(--tech-border);}
.toggle-thumb{width:9px;height:9px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.tech-toggle.on .toggle-thumb{left:13px;}
/* VIEW SWITCHER */
.view-switcher{display:inline-flex;border:1.5px solid var(--border);border-radius:20px;overflow:hidden;background:var(--white);}
.view-btn{padding:6px 14px;font-size:.76rem;font-weight:600;color:var(--slate-mid);cursor:pointer;user-select:none;transition:all .15s;border:none;background:none;font-family:inherit;}
.view-btn:hover{color:var(--sage);}
.view-btn.active{background:var(--sage);color:#fff;}
/* EXPAND TOGGLE */
.expand-toggle{background:none;border:1px solid var(--border);border-radius:16px;font-size:.73rem;color:var(--slate-mid);cursor:pointer;padding:5px 11px;font-family:inherit;font-weight:500;transition:all .15s;}
.expand-toggle:hover{border-color:var(--sage);color:var(--sage);}
.expand-toggle.on{background:var(--sage-light);border-color:var(--sage);color:var(--sage);}
/* PHASE TABLE */
.phase-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.phase-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.phase-table thead th{background:var(--slate);color:#fff;font-size:.71rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:11px 14px;text-align:left;border-right:1px solid rgba(255,255,255,.12);}
.phase-table thead th:last-child{border-right:none;}
.phase-table th.col-phase{width:14%;}
.phase-table th.col-teacher{width:30%;}
.phase-table th.col-student{width:28%;}
.phase-table th.col-aims{width:28%;}
.phase-table td{vertical-align:top;padding:0;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.phase-table td:last-child{border-right:none;}
.phase-table tr:last-child td{border-bottom:none;}
.phase-table tbody tr:nth-child(even) td{background:#f8faf9;}
.phase-table tbody tr:nth-child(odd) td{background:var(--white);}
.td-phase{padding:12px 12px 12px 14px !important;}
.phase-num-badge{width:26px;height:26px;border-radius:50%;color:#fff;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:7px;}
.phase-label-name{font-weight:700;font-size:.84rem;color:var(--slate);line-height:1.35;}
.phase-label-sub{font-size:.74rem;color:var(--text-muted);font-style:italic;margin-top:3px;line-height:1.35;}
.cell-inner{max-height:var(--cell-max-h);overflow-y:auto;padding:11px 13px;scrollbar-width:thin;scrollbar-color:var(--sage-mid) transparent;}
.cell-inner::-webkit-scrollbar{width:4px;}
.cell-inner::-webkit-scrollbar-thumb{background:var(--sage-mid);border-radius:2px;}
.phase-table.expanded .cell-inner{max-height:none;overflow-y:visible;}
/* BULLET LISTS */
.b-list{list-style:disc;padding-left:16px;}
.b-list li{font-size:.84rem;line-height:1.58;padding:2px 0;}
.b-list li+li{margin-top:1px;}
/* TECH BULLETS */
.tech-item{display:none;list-style:none !important;background:var(--tech-bg);border-left:3px solid var(--tech-border);border-radius:0 3px 3px 0;padding:5px 8px;margin:4px 0 4px -16px;font-size:.81rem;color:var(--tech-text);line-height:1.52;}
body.show-tech .tech-item{display:list-item;}
.tech-badge{display:inline-block;font-size:.58rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;background:var(--tech-border);color:#fff;padding:1px 5px;border-radius:3px;margin-right:5px;vertical-align:1px;}
/* PROMPTS */
.prompts-box{background:#f7faf7;border:1px solid var(--sage-mid);border-radius:5px;padding:8px 11px;margin-top:8px;}
.prompts-lbl{font-size:.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sage);margin-bottom:5px;}
.prompts-list{list-style:disc;padding-left:16px;}
.prompts-list li{font-size:.82rem;font-style:italic;color:var(--slate-mid);padding:2px 0;}
/* AIMS */
.aim-item{display:flex;gap:7px;align-items:flex-start;margin-bottom:6px;}
.aim-tag{font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:9px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.aim-tag.Appreciate{background:#fdebd0;color:#b06020;}
.aim-tag.Understand{background:#d5e8d4;color:#356633;}
.aim-tag.Take-Action{background:#dae8fc;color:#2a588a;}
.aim-text{font-size:.83rem;line-height:1.58;}
/* CARDS VIEW */
.phase-cards{display:none;}
.phase-cards.active{display:block;}
.phase-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:9px;box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .18s;}
.phase-card:hover{box-shadow:var(--shadow-md);}
.phase-card-hdr{display:flex;align-items:center;gap:13px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .15s;}
.phase-card-hdr:hover{background:var(--slate-light);}
.pc-num{width:28px;height:28px;border-radius:50%;color:#fff;font-size:.74rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pc-title{flex:1;}
.pc-name{font-weight:600;font-size:.9rem;color:var(--slate);}
.pc-sub{font-size:.74rem;color:var(--text-muted);font-style:italic;margin-top:1px;}
.pc-chev{color:var(--text-muted);font-size:.68rem;flex-shrink:0;transition:transform .22s;}
.phase-card.open .pc-chev{transform:rotate(90deg);}
.phase-card-body{display:none;border-top:1px solid var(--border);}
.phase-card.open .phase-card-body{display:block;}
/* COL PANELS */
.col-panel{border-bottom:1px solid var(--border);}
.col-panel:last-child{border-bottom:none;}
.col-hdr{display:flex;align-items:center;gap:7px;padding:9px 16px;cursor:pointer;user-select:none;background:#f7f9fb;transition:background .14s;}
.col-hdr:hover{background:#eef2f5;}
.col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.col-lbl{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;flex:1;}
.col-chev{color:var(--text-muted);font-size:.63rem;flex-shrink:0;transition:transform .2s;}
.col-panel.closed .col-chev{transform:rotate(-90deg);}
.col-content{padding:12px 16px 14px 28px;}
.col-panel.closed .col-content{display:none;}
.col-teacher .col-dot{background:#4a6741;}.col-teacher .col-lbl{color:#3a5332;}
.col-student .col-dot{background:#3d6b84;}.col-student .col-lbl{color:#2d5568;}
.col-aims    .col-dot{background:#7a6a3a;}.col-aims    .col-lbl{color:#635630;}
/* DIFF SECTION */
.diff-section{margin-top:28px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.diff-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;user-select:none;background:#f5f3ef;transition:background .15s;}
.diff-hdr:hover{background:#edeae4;}
.diff-hdr h2{font-family:"Libre Baskerville",serif;font-size:.92rem;color:var(--slate);}
.diff-section.open .acc-chev{transform:rotate(180deg);}
.diff-body{display:none;}
.diff-section.open .diff-body{display:block;}
.diff-intro{padding:12px 20px;font-size:.85rem;color:var(--text-muted);border-bottom:1px solid var(--border);line-height:1.65;}
/* DIFF TABLE */
.diff-table-wrap{overflow-x:auto;}
.diff-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.diff-table thead th{background:#4a5a6a;color:#fff;font-size:.7rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:10px 14px;text-align:left;border-right:1px solid rgba(255,255,255,.12);}
.diff-table thead th:last-child{border-right:none;}
.diff-table th.col-phase{width:16%;}
.diff-table th.col-lower{width:42%;}
.diff-table th.col-higher{width:42%;}
.diff-table td{vertical-align:top;padding:0;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.diff-table td:last-child{border-right:none;}
.diff-table tr:last-child td{border-bottom:none;}
.diff-table tbody tr:nth-child(even) td{background:#f8faf9;}
.diff-table tbody tr:nth-child(odd) td{background:var(--white);}
.diff-cell{max-height:var(--cell-max-h);overflow-y:auto;padding:10px 13px;scrollbar-width:thin;scrollbar-color:#b8c8d0 transparent;}
.diff-cell::-webkit-scrollbar{width:4px;}
.diff-cell::-webkit-scrollbar-thumb{background:#b8c8d0;border-radius:2px;}
.diff-table.expanded .diff-cell{max-height:none;overflow-y:visible;}
.col-lower-th{color:#d8e4f8 !important;}
.col-higher-th{color:#cceedd !important;}
/* COMING SOON */
.coming-soon-panel{text-align:center;padding:70px 40px;color:var(--text-muted);}
.coming-soon-panel .cs-icon{font-size:2rem;margin-bottom:12px;}
.coming-soon-panel h3{font-family:"Libre Baskerville",serif;font-size:.95rem;color:var(--slate-mid);margin-bottom:5px;}
@media(max-width:700px){
  header{padding:16px 18px;}
  .approach-tabs{padding:0 8px;overflow-x:auto;scrollbar-width:none;}
  .approach-tabs::-webkit-scrollbar{display:none;}
  .content-wrap{padding:16px 14px 48px;}
  .phases-hdr{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>
<header><h1>Pedagogical Approaches</h1></header>

<nav class="approach-tabs">

  <div class="approach-tab" data-panel="ibl">IBL</div>
  <div class="approach-tab" data-panel="cbl">CBL</div>
  <div class="approach-tab" data-panel="ssi">SSI</div>
</nav>

<div id="pbl" class="approach-panel active"><div class="content-wrap" id="pblContent"></div></div>
<div id="ibl" class="approach-panel"><div class="content-wrap" id="iblContent"></div></div>
<div id="cbl" class="approach-panel"><div class="content-wrap" id="cblContent"></div></div>
<div id="ssi" class="approach-panel"><div class="content-wrap" id="ssiContent"></div></div>

uilding conservation?", "keyQuestionBody": "Singapore's heritage buildings are more than old structures; they are tangible records of the nation's history, cultural identity and collective memory. Landmarks such as churches, monuments, memorials, and colonial-era buildings connect present-day Singaporeans to their past. Once damaged, many of their original features and architectural details cannot be fully restored.\n\nIn this Problem-Based Learning experience, students explore the challenge of protecting heritage buildings from the long-term effects of acidic rainfall. Although Singapore does not experience acid rain at the same severity as some heavily industrialised regions, air pollutants can dissolve in rainwater to form acids. Over time, acidic rainfall can react with building materials such as limestone and marble, which contain calcium carbonate. These reactions gradually erode surfaces, weaken structures, and remove intricate carvings and inscriptions that hold historical significance.\n\nUsing heritage conservation as the context helps students develop an affective connection to the issue. Rather than learning acid-base chemistry as an abstract topic, students engage with a real-world problem that has local relevance and social significance. They consider how scientific knowledge can contribute to preserving places that matter to Singapore and future generations.\n\nThe context also presents a hopeful and action-oriented perspective. While the effects of acidic rainfall can accumulate over long periods, scientific understanding enables early detection, preventive maintenance, material selection, and conservation strategies that can reduce damage. Students investigate the chemistry behind acidic rainfall, analyse evidence on its impact on different materials, and evaluate possible mitigation measures."}, "diffIntro": "Problem-based learning can be differentiated for students of different readiness. The essence of PBL is preserved in all differentiation, where students engage in sense-making the authentic problem, identifying learning needs, gathering and evaluating evidence, constructing explanations and proposing evidence-information solutions.", "phases": [{"name": "Problem Scenario", "subtitle": "", "teacher": [{"tech": false, "text": "Present the problem: \"How should Singapore manage the impact of acidic rainfall on infrastructure and heritage building conservation?\""}, {"tech": true, "text": "Use images, videos and virtual tours of Singapore's heritage buildings to build an affective connection to these spaces, helping students appreciate their historical significance and understand why preserving them matters."}, {"tech": false, "text": "Teachers can also bring students on a learning journey to visit these places of interest."}, {"tech": true, "text": "Use images or videos of weathered buildings, heritage structures, statues or concrete surfaces to make the issue visible and relatable."}], "teacher_prompts": [], "student": ["Ask questions to clarify the problem.", "Identify why the issue matters scientifically, historically and socially.", "Share initial ideas about how acidic rainfall may affect buildings.", "Explain why heritage conservation matters."], "aims": [{"tag": "Appreciate", "text": "Students see the relevance of science in protecting infrastructure and heritage buildings in Singapore. They recognise that science can help address issues that affect society, culture and the environment."}]}, {"name": "Identify Facts", "subtitle": "to formulate and analyse the problem", "teacher": [{"tech": false, "text": "Guide students to identify key facts from the scenario."}, {"tech": true, "text": "Use videos, animations or interactives to introduce acid rain, weathering and effects on carbonate-based materials."}, {"tech": true, "text": "Use a teacher demonstration or video showing acid reacting with marble chips to introduce the phenomenon."}, {"tech": true, "text": "Use platforms such as Google Docs, Padlet o  properties, and chemical weathering.\n\n[Understand] Students engage in the practices of science by formulating investigable questions, developing hypotheses, and identifying evidence needed to evaluate competing explanations."}]}, {"name": "Identify Knowledge Deficiencies", "subtitle": "for self-directed learning", "teacher": [{"tech": false, "text": "Facilitate students in identifying what they need to know to solve the problem."}, {"tech": false, "text": "Guide students to consider knowledge needed to solve the problem, including:"}, {"tech": false, "text": "pH and acidity"}, {"tech": false, "text": "acid-carbonate reactions"}, {"tech": false, "text": "factors affecting rate of reaction"}, {"tech": false, "text": "properties of materials"}, {"tech": false, "text": "heritage buildings conservation approaches"}, {"tech": true, "text": "Use digital reflection journals or portfolios to support reflection. The following prompts can be used to guide students: \"What do I understand?\" \"What am I unsure about?\" \"What do I need to find out next?\""}], "teacher_prompts": [], "student": ["Identify knowledge gaps and learning needs.", "Formulate research questions", "Conduct guided research using curated sources.", "Record questions and learning points in a reflection journal or group learning log."], "aims": [{"tag": "Take Action", "text": "Students take ownership of their learning by identifying and addressing knowledge gaps needed to solve a real-world problem."}]}, {"name": "Apply New Knowledge", "subtitle": "to evaluate their hypotheses in light of what they have learnt", "teacher": [{"tech": false, "text": "Support students in carrying out a structured practical investigation using solutions of different pH and building materials (e.g., carbonate, other possible materials proposed for the solution)"}, {"tech": false, "text": "Facilitate safe collection of quantitative and qualitative evidence"}, {"tech": true, "text": "Use digital probes, sensors, balances, data l   ibl: {"whatIs": {"definition": "Inquiry-Based Learning (IBL) is a constructivist approach to teaching and learning where students explore problems, issues, phenomena, or ideas through a process guided by driving questions.", "whenUseful": [], "characteristicQuestions": []}, "leIntro": {"bullets": ["This LE is situated within a lesson which includes all phases of IBL. (Note: Not all lessons need to have all phases)"], "keyQuestion": "", "keyQuestionBody": ""}, "diffIntro": "The learning experience above showcases an example of open inquiry. It can be differentiated for students of different readiness. The essence of IBL is preserved in all differentiation, where students will ask authentic questions, persist through uncertainty, engage in evidence-based reasoning, and be curious about their world.", "phases": [{"name": "Orientation", "subtitle": "", "teacher": [{"tech": false, "text": "Teacher introduces the phenomenon, question, and scientific claim to be verified."}], "teacher_prompts": [], "student": ["Teacher introduces the phenomenon and inquiry question."], "aims": []}, {"name": "Conceptualisation", "subtitle": "", "teacher": [{"tech": false, "text": "Teacher provides the hypothesis or expected relationship and relevant concepts."}], "teacher_prompts": [], "student": ["Teacher provides key concepts", "Students generate explanations or predictions."], "aims": []}, {"name": "Investigation", "subtitle": "", "teacher": [{"tech": false, "text": "Teacher provides procedures and data collection methods."}, {"tech": false, "text": "Students follow the procedure."}, {"tech": false, "text": "Students collect and analyses data."}], "teacher_prompts": [], "student": ["Teacher provides procedures and data collection methods.", "Students follow the procedure.", "Students collect and analyses data."], "aims": []}, {"name": "Conclusion", "subtitle": "", "teacher": [{"tech": false, "text": "Students determine whether evidence supports the given claim"}], "teacher_prompts": []   cbl: {"whatIs": {"definition": "Concept-Based Learning (PBL) is a pedagogical approach where students learn through solving a complex real-world problem that has no single correct answer. Students work collaboratively to identify what they need to learn, engage in self-directed learning, apply that new knowledge to the problem, and then reflect on both what they learned and how effective their strategies were. The teacher acts as a facilitator rather than a knowledge provider. The various stages of PBL also provide opportunities to develop the Ways of Thinking and Doing (WOTD) in students.", "whenUseful": ["is authentic and meaningful to students", "involves real-world constraints and trade-offs", "requires students to apply scientific concepts and practices", "allows for more than one possible solution", "supports students in making informed decisions and taking responsible action"], "characteristicQuestions": ["What is the problem we are trying to solve?", "What do we already know, and what do we need to find out?", "What data do we need to collect?", "What possible explanations or solutions can we propose?", "How can we justify our decision using scientific evidence?", "What action can we take, and what trade-offs must we consider?"]}, "leIntro": {"bullets": ["This LE is situated within a learning sequence that includes all the phases of PBL.", "In this learning sequence, students first encounter an authentic problem on how Singapore should manage the impact of acidic rainfall on infrastructure and heritage building conservation.", "They identify relevant facts and knowledge gaps, generate hypotheses about how acidic rainfall affects carbonate-based materials, conduct a practical investigation using acidic solutions and marble chips or limestone, apply their new knowledge to interpret evidence, and finally propose evidence-informed conservation actions."], "keyQuestion": "How should Singapore manage the impact of acidic rainfall on infrastructure and heritage building conservation?", "keyQuestionBody": "Singapore's heritage buildings are more than old structures; they are tangible records of the nation's history, cultural identity and collective memory. Landmarks such as churches, monuments, memorials, and colonial-era buildings connect present-day Singaporeans to their past. Once damaged, many of their original features and architectural details cannot be fully restored.\n\nIn this Problem-Based Learning experience, students explore the challenge of protecting heritage buildings from the long-term effects of acidic rainfall. Although Singapore does not experience acid rain at the same severity as some heavily industrialised regions, air pollutants can dissolve in rainwater to form acids. Over time, acidic rainfall can react with building materials such as limestone and marble, which contain calcium carbonate. These reactions gradually erode surfaces, weaken structures, and remove intricate carvings and inscriptions that hold historical significance.\n\nUsing heritage conservation as the context helps students develop an affective connection to the issue. Rather than learning acid-base chemistry as an abstract topic, students engage with a real-world problem that has local relevance and social significance. They consider how scientific knowledge can contribute to preserving places that matter to Singapore and future generations.\n\nThe context also presents a hopeful and action-oriented perspective. While the effects of acidic rainfall can accumulate over long periods, scientific understanding enables early detection, preventive maintenance, material selection, and conservation strategies that can reduce damage. Students investigate the chemistry behind acidic rainfall, analyse evidence on its impact on different materials, and evaluate possible mitigation measures."}, "diffIntro": "Problem-based learning can be differentiated for students of different readiness. The essence of PBL is preserved in all differentiation, whe   ssi: {"whatIs": {"definition": "Socio-Scientific Issue-based Learning (SSI-L) is a pedagogical approach where students learn science through engaging with authentic, open-ended and socially relevant issues that are closely connected to scientific knowledge. These issues often involve ethical, social, economic, environmental or political considerations, and usually do not have a single correct answer.", "whenUseful": ["is authentic and meaningful to students", "is connected to scientific concepts and evidence", "involves ethical or societal implications", "requires students to consider multiple perspectives", "allows for more than one defensible position", "supports students in making informed decisions and taking responsible action"], "characteristicQuestions": ["What is the socio-scientific issue we are examining?", "What scientific knowledge is needed to understand the issue?", "What evidence is available, and how reliable is it?", "Who are the stakeholders affected by this issue?", "What ethical principles or values are involved?", "What different perspectives or trade-offs need to be considered?", "What decision or course of action can be justified using science, evidence and ethical reasoning?", "In the context of science education, SSI-L supports students in developing scientific literacy by helping them understand how science interacts with society. It also provides opportunities to develop the Practices of Science, especially in using evidence, evaluating claims, constructing arguments and making informed decisions.", "The table below outlines the essential and recommended components of the SSI instructional framework (Sadler et al, 2013)."]}, "leIntro": {"bullets": [], "keyQuestion": "", "keyQuestionBody": ""}, "diffIntro": "The learning experience above showcases an example of open inquiry. It can be differentiated for students of different readiness. The essence of IBL is preserved in all differentiation, where students will ask authentic questions, persist through uncertainty, engage in evidence-based reasoning, and be curious about their world.", "phases": [{"name": "Recognising the ethical dilemma (SSI)", "subtitle": "", "teacher": [{"tech": false, "text": "Teacher presents the SSI – Should vaccination against Disease X be made compulsory, to provide context to the lesson. For students to make a decision as lawmakers, they need to learn more about vaccination in Singapore first."}, {"tech": true, "text": "Teacher shows students Interactive or Excel Immunisation chart against various diseases based on age in Singapore."}, {"tech": false, "text": "Teacher prompts students to generate questions and conclusions from the chart."}, {"tech": false, "text": "Teacher prompts students to think why vaccines against diphtheria and measles are compulsory in Singapore."}, {"tech": false, "text": "Teacher introduces students to the Singapore Infectious Disease Act."}], "teacher_prompts": [], "student": ["Students generate conclusions and questions from the chart.", "Students generate reasons as to why vaccinations against diphtheria and measles are compulsory in Singapore, but other vaccines are recommended.", "(Tech) Students can interact with AI-Chatbot to learn more about the Singapore Infectious Disease Act as well as the diseases featured in the chart.", "(Tech) Padlet, SLS DAT or Classpoint can be used to collate and summarise students' responses."], "aims": [{"tag": "Understand", "text": " Students' prior knowledge is activated Students are engaged in formulating conclusions and explanations from data, mirroring authentic scientific practices."}, {"tag": "Appreciate", "text": " Students appreciate vaccination through their lived experience of the COVID-19 pandemic, providing a meaningful entry point for appreciating how scientific knowledge shapes public health decisions."}]}, {"name": "Information Gathering", "subtitle": "the science", "teacher": [{"tech": false, "text": "Teacher groups students to carry out Jigsaw learning to learn more about vaccination and their impacts."}, {"tech": true, "text": "Teacher supports students in using digital tools to consolidate learning and providing different media resources to support the different learning preferences of students."}], "teacher_prompts": [], "student": ["Students select one aspect about vaccination to deep dive into. Students interact with articles and videos about vaccinations to answer guiding questions.", "(Tech) Students document their responses digitally to enable peer and teacher feedback.", "(Tech) Students use AI tools like ChatGPT and Notebook LM to help summarise and distil salient learning points. Students can also use the abovementioned AI tools to clarify questions they have about the information sources.", "Students within the same group convene to share their learnings about the science behind vaccination, ethical and social implications of vaccination and perspectives from different stakeholders."], "aims": [{"tag": "Understand", "text": " Students engage in evidence-based reasoning, data collection, and analysis which are core science practices that deepen understanding of disciplinary concepts."}, {"tag": "Appreciate", "text": " Students appreciate different perspectives about the SSI whilst interacting with media resources, learning that scientific knowledge is represented and interpreted differently by various stakeholders."}, {"tag": "Take Action", "text": " Some student agency is involved as they take ownership of their own and the group's learning of the issue. Through collaborative learning, students develop strong communication and collaboration skills as they work effectively in teams to co-construct knowledge and share findings. The use of multimedia resources encourages students to persist through uncertainty, question information sources and biases and develop the curiosity and resilience needed for lifelong scientific inquiry."}]}, {"name": "Engaging in Ethical Reasoning", "subtitle": "", "teacher": [{"tech": false, "text": "Teacher gets students to make individual stands to the SSI – Should vaccination against Disease X be made compulsory in Singapore?"}, {"tech": true, "text": "Teacher can use Mentimeter or Classpoint to provide visualisation of the class responses."}, {"tech": false, "text": "Teacher introduces the four bioethical principles that serve as a guide for making reasoned judgements."}, {"tech": false, "text": "Respect for Persons"}, {"tech": false, "text": "Justice"}, {"tech": false, "text": "Minimise Harm"}, {"tech": false, "text": "Maximise Benefits"}, {"tech": false, "text": "Teacher guides students to sort the reasons under each bioethical principle."}, {"tech": false, "text": "Teacher facilitates whole-class discussion on categorising the reasons under the principles, as well as highlighting reasons that do not fall under any of the principles."}, {"tech": true, "text": "Teacher may use AI-supported tools to summarise discussion board responses, identify common patterns, or surface contrasting explanations for discussion."}], "teacher_prompts": [], "student": ["Students generate reasons to support their stand.", "(Tech) Padlet or Classpoint can be used to collate and summarise students' responses.", "Students obtain a duplicate copy of the class's reasons for and against vaccination against Disease X. Students read through responses and sort them under the 4 principles.", "(Tech) Students can interact with AI Chatbot to clarify their understanding of each bioethical principle. AI Chatbot may provide contextual examples of what each principle means.", "(Tech) Students can use AI tools like Snorkl , Transcribe, Vocaroo to record their discussion and to summarise their discussion for presentation. Students can use Notebook LM or ChatGPT to generate alternative presentation representations of their discussion."], "aims": [{"tag": "Understand", "text": " As students communicate findings and engage in argumentation, they develop values such as objectivity, integrity, and respect for evidence. They also gain greater understanding about decision-making of SSIs based on bioethical principles."}, {"tag": "Take Action", "text": " Through collaborative investigations, students develop strong communication and collaboration skills as they work effectively in teams to co-construct knowledge and share findings. Through bioethical reasoning activity, students develop informed views and positions on the SSI of compulsory vaccination, building the capacity to engage in future discourse on other SSIs and broader STSE issues, and ultimately becoming scientifically literate citizens who can participate responsibly in society."}]}, {"name": "Culminating experience", "subtitle": "", "teacher": [{"tech": false, "text": "Teacher re-surfaces the SSI ethical dilemma to the class – as Singaporean lawmakers, should vaccination against Disease X be made compulsory?"}, {"tech": false, "text": "Teacher scaffolds students to craft a policy paper as lawmakers."}, {"tech": false, "text": "Teacher provides feedback on the scientific validity and quality of students' explanations and reasoning."}, {"tech": true, "text": "Teacher use AI tools such as Snokrl, SLS SAFA/AFA to provide feedback and grading."}, {"tech": false, "text": "Teacher concludes the lesson to explain that issue of making vaccination compulsory is complex and requires justification not only using scientific evidence but also using bioethical principles."}, {"tech": false, "text": "Teacher gets students to reflect on their understanding of vaccination and their views on vaccination."}], "teacher_prompts": [], "student": ["Students communicate and justify their stand in the policy paper, providing a strong justification that includes a clear decision, confirmatory facts, reference to ethical principles, and consideration of alternative views and rebuttals.", "(Tech) Students write their policy paper collaboratively using google documents or collaborative platforms.", const APPROACH_LABELS = {
  pbl: { name: 'Problem-Based Learning',   icon: '&#127807;' },
  ibl: { name: 'Inquiry-Based Learning',   icon: '&#128300;' },
  cbl: { name: 'Concept-Based Learning',                icon: '&#127381;' },
  ssi: { name: 'Socio-Scientific Issues-Based Learning', icon: '&#9878;&#65039;' },
};

// ── STATIC UI LABELS ──────────────────────────────────────────────────────
const LABELS = {
  teacherRole: "Teacher\u2019s Role",
  studentRole: "Students\u2019 Role",
  aims:        "Relevance to the 3 Aims",
  lowerReady:  "For Lower Readiness Students",
  higherReady: "For Higher Readiness Students",
  phase:       "Phase",
  techShow:    "Show Tech suggestions",
  techHide:    "Hide Tech suggestions",
  expandAll:   "Expand all rows",
  collapseAll: "Collapse rows",
  readMore:    "Read more",
  readLess:    "Read less",
};

const PHASE_COLORS = ['#4a6741','#3d6b84','#7a6a3a','#5a5a8a','#3a7a5a','#8a4a5a'];

// ── UTILS ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── RENDERERS (all template literals) ────────────────────────────────────
function renderTeacher(items, prompts) {
  const bullets = (items ?? []).map(it => it.tech
    ? `<li class="tech-item"><span class="tech-badge">Tech</span> ${esc(it.text)}</li>`
    : `<li>${esc(it.text)}</li>`
  ).join('');
  const promptBox = (prompts && prompts.length) ? `
    <div class="prompts-box">
      <div class="prompts-lbl">Teacher Prompts</div>
      <ul class="prompts-list">${prompts.map(p => `<li>${esc(p)}</li>`).join('')}</ul>
    </div>` : '';
  return `<ul class="b-list">${bullets}</ul>${promptBox}`;
}

function renderBullets(arr) {
  if (!arr || !arr.length) return '';
  return `<ul class="b-list">${arr.map(s => `<li>${esc(s)}</li>`).join('')}</ul>`;
}

function renderAims(aims) {
  return (aims ?? []).map(a => {
    const cls = a.tag.replace(/\s+/g, '-');
    return `<div class="aim-item">
      <span class="aim-tag ${cls}">${esc(a.tag)}</span>
      <span class="aim-text">${esc(a.text)}</span>
    </div>`;
  }).join('');
}

function colPanel(cls, label, inner) {
  return `<div class="col-panel ${cls}">
    <div class="col-hdr" onclick="toggleColPanel(this)">
      <span class="col-dot"></span>
      <span class="col-lbl">${label}</span>
      <span class="col-chev">&#9660;</span>
    </div>
    <div class="col-content">${inner}</div>
  </div>`;
}

function makeAccordion(id, title, body) {
  return `<div class="accordion" id="${id}">
    <div class="accordion-hdr" onclick="toggleAcc('${id}')">
      <h2>${title}</h2><span class="acc-chev">&#9660;</span>
    </div>
    <div class="accordion-body">${body}</div>
  </div>`;
}

// ── BUILD ONE APPROACH ────────────────────────────────────────────────────
function buildApproach(key, data, contentId) {
  const label = APPROACH_LABELS[key];

  if (!data) {
    document.getElementById(contentId).innerHTML = `
      <div class="coming-soon-panel">
        <div class="cs-icon">${label.icon}</div>
        <h3>${label.name}</h3>
        <p>Under development.</p>
      </div>`;
    return;
  }

  const w  = data.whatIs;
  const le = data.leIntro;

  // What is X?
  const wBody = `
    <p class="def-para">${esc(w.definition)}</p>
    ${w.whenUseful && w.whenUseful.length ? `
      <p class="sub-head">${esc(label.name)} is especially useful when the problem:</p>
      <ul class="plain-list">${w.whenUseful.map(i => `<li>${esc(i)}</li>`).join('')}</ul>` : ''}
    ${w.characteristicQuestions && w.characteristicQuestions.length ? `
      <p class="sub-head">Characteristic questions:</p>
      <ul class="q-list">${w.characteristicQuestions.map(i => `<li>${esc(i)}</li>`).join('')}</ul>` : ''}`;

  // LE intro
  const kqParas = (le.keyQuestionBody || '').split('\n\n').filter(Boolean);
  const leBody = `
    <ul class="seq-list">${(le.bullets || []).map(b => `<li>${esc(b)}</li>`).join('')}</ul>
    <div class="key-q-box">
      <div class="key-q-lbl">Key Question</div>
      <div class="key-q-q">${esc(le.keyQuestion)}</div>
      <div class="key-q-body">
        <p>${esc(kqParas[0] || '')}</p>
        <div class="key-q-more" id="${key}KqMore">
          ${kqParas.slice(1).map(p => `<p>${esc(p)}</p>`).join('')}
        </div>
      </div>
      <button class="key-q-btn" onclick="toggleKQ('${key}')">
        <span id="${key}KqIco">&#9660;</span>
        <span id="${key}KqTxt">${LABELS.readMore}</span>
      </button>
    </div>`;

  // Phase table rows
  const tableRows = (data.phases || []).map((ph, i) => `
    <tr>
      <td class="td-phase">
        <div class="phase-num-badge" style="background:${PHASE_COLORS[i]}">${i+1}</div>
        <div class="phase-label-name">${esc(ph.name)}</div>
        ${ph.subtitle ? `<div class="phase-label-sub">${esc(ph.subtitle)}</div>` : ''}
      </td>
      <td><div class="cell-inner">${renderTeacher(ph.teacher, ph.teacher_prompts)}</div></td>
      <td><div class="cell-inner">${renderBullets(ph.student)}</div></td>
      <td><div class="cell-inner">${renderAims(ph.aims)}</div></td>
    </tr>`).join('');

  // Cards
  const cards = (data.phases || []).map((ph, i) => `
    <div class="phase-card" id="${key}pc${i}">
      <div class="phase-card-hdr" onclick="toggleCard('${key}',${i})">
        <div class="pc-num" style="background:${PHASE_COLORS[i]}">${i+1}</div>
        <div class="pc-title">
          <div class="pc-name">${esc(ph.name)}</div>
          ${ph.subtitle ? `<div class="pc-sub">${esc(ph.subtitle)}</div>` : ''}
        </div>
        <span class="pc-chev">&#9654;</span>
      </div>
      <div class="phase-card-body">
        ${colPanel('col-teacher', LABELS.teacherRole, renderTeacher(ph.teacher, ph.teacher_prompts))}
        ${colPanel('col-student', LABELS.studentRole, renderBullets(ph.student))}
        ${colPanel('col-aims',    LABELS.aims,        renderAims(ph.aims))}
      </div>
    </div>`).join('');

  // Diff rows
  const diffRows = (data.diffPhases || []).map((dp, i) => `
    <tr>
      <td class="td-phase">
        <div class="phase-num-badge" style="background:${PHASE_COLORS[i]}">${i+1}</div>
        <div class="phase-label-name">${esc(dp.name)}</div>
      </td>
      <td><div class="diff-cell">${renderBullets(dp.lower)}</div></td>
      <td><div class="diff-cell">${renderBullets(dp.higher)}</div></td>
    </tr>`).join('');

  document.getElementById(contentId).innerHTML = `
    ${makeAccordion(`${key}AccWhat`, `What is ${label.name}?`, wBody)}
    ${makeAccordion(`${key}AccLe`, 'LE facilitated by a teacher in the classroom', leBody)}

    <div class="phases-hdr">
      <h2>Learning Sequence &#8212; Phases</h2>
      <div class="phases-controls">
        <button class="tech-toggle" id="${key}TechBtn" onclick="toggleTech('${key}')">
          <span>&#128295;</span>
          <span id="${key}TechLbl">${LABELS.techShow}</span>
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
        </button>
        <div class="view-switcher">
          <button class="view-btn active" id="${key}BtnTable" onclick="setView('${key}','table')">&#9776;&nbsp;Table</button>
          <button class="view-btn"        id="${key}BtnCards" onclick="setView('${key}','cards')">&#9647;&nbsp;Cards</button>
        </div>
        <button class="expand-toggle" id="${key}ExpandBtn" onclick="toggleExpand('${key}')">${LABELS.expandAll}</button>
      </div>
    </div>

    <div id="${key}TableView">
      <div class="phase-table-wrap">
        <table class="phase-table" id="${key}PhaseTable">
          <thead><tr>
            <th class="col-phase">${LABELS.phase}</th>
            <th class="col-teacher">${LABELS.teacherRole}</th>
            <th class="col-student">${LABELS.studentRole}</th>
            <th class="col-aims">${LABELS.aims}</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>

    <div id="${key}CardsView" class="phase-cards">${cards}</div>

    <div class="diff-section" id="${key}DiffSec">
      <div class="diff-hdr" onclick="toggleDiff('${key}')">
        <h2>Differentiating Instruction for Students</h2>
        <span class="acc-chev">&#9660;</span>
      </div>
      <div class="diff-body">
        <p class="diff-intro">${esc(data.diffIntro || '')}</p>
        <div class="diff-table-wrap">
          <table class="diff-table" id="${key}DiffTable">
            <thead><tr>
              <th class="col-phase">${LABELS.phase}</th>
              <th class="col-lower col-lower-th">${LABELS.lowerReady}</th>
              <th class="col-higher col-higher-th">${LABELS.higherReady}</th>
            </tr></thead>
            <tbody>${diffRows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────
document.querySelectorAll('.approach-tab').forEach(t => {
  t.addEventListener('click', () => {
    if (t.classList.contains('coming-soon')) return;
    document.querySelectorAll('.approach-tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.approach-panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.panel).classList.add('active');
  });
});

function toggleAcc(id)       { document.getElementById(id).classList.toggle('open'); }
function toggleColPanel(hdr) { hdr.closest('.col-panel').classList.toggle('closed'); }
function toggleCard(key, i)  { document.getElementById(`${key}pc${i}`).classList.toggle('open'); }
function toggleDiff(key)     { document.getElementById(`${key}DiffSec`).classList.toggle('open'); }

function toggleTech(key) {
  document.body.classList.toggle(`show-tech-${key}`);
  const on = document.body.classList.contains(`show-tech-${key}`);
  document.getElementById(`${key}TechBtn`).classList.toggle('on', on);
  document.getElementById(`${key}TechLbl`).textContent = on ? LABELS.techHide : LABELS.techShow;
}

// Tech visibility per approach
const styleEl = document.createElement('style');
document.head.appendChild(styleEl);
['pbl','ibl','cbl','ssi'].forEach(k => {
  styleEl.sheet.insertRule(
    `body.show-tech-${k} #${k}Content .tech-item { display: list-item; }`, 0
  );
});

const expandState = {};
function toggleExpand(key) {
  expandState[key] = !expandState[key];
  const on = expandState[key];
  document.getElementById(`${key}PhaseTable`)?.classList.toggle('expanded', on);
  document.getElementById(`${key}DiffTable`)?.classList.toggle('expanded', on);
  const btn = document.getElementById(`${key}ExpandBtn`);
  btn.textContent = on ? LABELS.collapseAll : LABELS.expandAll;
  btn.classList.toggle('on', on);
}

const viewState = {};
function setView(key, v) {
  viewState[key] = v;
  document.getElementById(`${key}TableView`).style.display = v === 'table' ? 'block' : 'none';
  document.getElementById(`${key}CardsView`).classList.toggle('active', v === 'cards');
  document.getElementById(`${key}BtnTable`).classList.toggle('active', v === 'table');
  document.getElementById(`${key}BtnCards`).classList.toggle('active', v === 'cards');
  document.getElementById(`${key}ExpandBtn`).style.display = v === 'table' ? '' : 'none';
}

function toggleKQ(key) {
  const m    = document.getElementById(`${key}KqMore`);
  const open = m.style.display === 'block';
  m.style.display = open ? 'none' : 'block';
  document.getElementById(`${key}KqIco`).innerHTML = open ? '&#9660;' : '&#9650;';
  document.getElementById(`${key}KqTxt`).textContent = open ? LABELS.readMore : LABELS.readLess;
}

// ── INIT ──────────────────────────────────────────────────────────────────
['pbl','ibl','cbl','ssi'].forEach(key => {
  buildApproach(key, APPROACH_DATA[key], `${key}Content`);
  // Mark tab as coming-soon if no data
  if (!APPROACH_DATA[key]) {
    document.querySelector(`[data-panel="${key}"]`).classList.add('coming-soon');
  }
});
</script>
</body>
</html>
